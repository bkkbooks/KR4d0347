body:
  text: 彞齊文編卷二宋趙孟堅撰五言律詩十三首庚辰除夕生計從來拙奚疑壁四空解憂惟父母謀事等兒童無競身如偶訛言耳願聾丈夫心鐵石肯自泣塗窮辛已除夕嵗事今其暮而多悵惋心功名一成否身世幾浮沉荄甲四墻在根株百蠧侵白雲飛處逺東望動微吟山行晚歸背日踏寒影歸程路覺長水流逢石響花晚度秋香前去多林莽新傳有虎狼行行應勿緩掠面已風霜尤美亭在昌化治平寺雖未及琅琊看來亦自佳微坳著新月聳翠帶餘霞巨鑿應靈禹斜拋或女媧小亭相對好莫放竹叢遮夜熱夜熱寢復起獨行池上亭欹荷傾泫露髙柳掛疏星秋蜇已啼草涸魚時唼萍無雲那有雨湛湛一天青䝉齊此閟先天地名齊曷扁䝉祇應防太潔未必果冬烘釀臘重醅酒初陽逗暖風當年郭有通此意與君同文宣公祠宇新成旋斫蓱蕪地亭臺出水瀕人知便行樂誰識念賢臣淡月花無影微風浪有鱗飛梁如跨水遊子更來頻何氏書堂元正假得晴野服暫山行遇石松盤蓋懸崖蘭倒生壁問題字古潭面鑒形清官滿應求此讀書秋月明鴻禧觀次髙橫槎韻逍遙微物纍出處任天真薄宦已陳夢青山猶故人鑑湖凉不暑荷葉淨無塵往往入圖畫扣舷欹角巾秦望與蘭亭山山遞送迎蓴鱸方嫩美草木亦欣榮去繼漢疏傅名肩齊魯生鴻都讀遺事誰不動歸情和陳魯山社日西湖二首繞堤千障碧過雨一回新並駕館中傑分題湖上春杯觴同臭味篇什倍精神招手年時燕遄歸尚及辰海棠料客醉故作暈微紅借路山無雨惜花天不風揚鑣聫勝士琢句策竒功讀罷身何許晴光蕩漾中江樓遲客野外遊神逈望中塵物稀天連逺水盡鳥背夕陽飛木葉初搖落鄉懷動式微興闌不忍去遲子一舠歸七言律詩十九首早春牡丹香泥封籜接頭新幻出花王見早春時節不須寒食候工夫逺勝洛陽人嫩黃䗶葉拳微皺半醉宫粧粉未勻恐怕晚風須愛護羅幃遮却看頻頻安吉州賦牡丹眼眩繁妍錦一機銅瓶分插遞參差幾於釘坐看如偶却為輕寒謝較遲售用奢豪須藉酒形容妖艷每難詩微風忽度輕披展絶憶霓裳駐拍時謝徐正十一兄惠牡丹顔帖左携珍帖右花王雅貺何殊照乘光拆壁漏痕含蠆尾珍珠露顆帶天香數千葉密憐檀暈怕六丁收謹匣藏答謝苦慚無好語撚髭空斷不成章種水芭蕉石上芭蕉手自移黃梅便得雨如期水根聫絡銀絲漾風葉紛抽羽扇欹日驗發生疑有凖心加愛護每忘疲猶如老大初生子及見成人長立時初冬客中見小春海棠一痕朝日界晴忩森肅清寒昨夜霜硯怕生澌微貯水爐因撥火起餘香最耽詩帖間中樂無奈塵埃客裏忙却是小春花謝絶海棠經月駐紅粧客中睡覺簷牙月一鈎適間真不願封侯病多藥褁長為侶靜著爐薰轉更幽席上眼明梅破臘霜餘珍重菊經秋從兹可向家居否强半經年在客舟和帑院叔久居朝蹟遲遷次雖在琴齊頗寂寥交少自應無援拔地寒安得有肥饒桃花落處春風緊梅蘂開時臘雪銷畢竟徐行能逺到樽前贏得且逍遙及書六考喜效白體無庸下考又三書知愧知慚意少舒儻便盍簪叨墨綬縱然休仕亦緋魚何人不願重金服那箇無心駟馬車修短洪纎應賦定好存方寸一由渠不寐不夢華胥仍不醉燈青室白自髙眠頻聞乾葉下空砌遙認征鴻唳逺天慮淡殊非同槁木無營豈復在齠年回思撲漉紅塵久虧損工夫只自憐邑圃池上南薰初愛葉田田忽見莖枯欲倒懸風露漸凄生淡泊水天相映作澄鮮無人領㑹微吟意獨自咿唔薄暮天一對陶朱山下鷺飛飛衝破晚炊烟養鸂鶒護毛不用籠寬織半殺雕翎養自馴退易進難微鶴歎凉來炎去異鴻賓橫枝梅下眠和月臨水薇邊遊近人更著花栽安蘚石黃筌圖畫鎮長新十日同憲僚登髙自嘆凄凉客寄身已孤茱酒奉慈親未應一夜無芳菊共上層樓有可人日射寒山宜近晚霜殷秋葉艷於春清歡率爾吾儕事帽落龍山意更真讀元舅雪溪先生墓銘二祖霜臺有烈聲傳家文憲見先生剛而不折松筠夀貧弗濫求冰玉清陶令秫田詩料足竇家桂子義方成即兹更有髙賢傳豈羡區區世上名拜掃易齊先生墓行樂今非少壯時一樽聊以酹吾師隻雞豈敢方前輩下馬猶能慰所思原上松杉新種植巨濟兄近為先生栽松杉望中桃李半披離歸途劇飲賡新句顛倒綸巾不自持隻雞斗酒禮雖微苦雨終風志不移卧病已辜寒食約踐盟猶及小春時老懷傷感渾如舊同舍追陪尚可期少憩東湖勿匆遽片雲來往正催詩寄湯帳幹鎖忩寂寞守燈熒熟數陳蹤迹杳冥已自無心雲淡淡不應逐計鼠營營發生最普惟春力幽隱旁昭是月明試品梅花霜下角動人深淺似秦箏招石希孟朝飯水臨軒檻絶纎埃砌面茸茸上緑苔伺餧金鱗渾可狎低飛翠羽不生猜篆薰欲起筵初集清磬才敲夢恰回正好西風坐蕭爽官程翻怕驛書催與帥幹架閣宗叔山中翁之子曾聞老吏說先猷咳唾珠璣下筆遒大器莫為時所用髙科還有子能收相逢禹會嗟何晚薄可郊寒匪暗投珍重斯文肯勉力清朝墳典要人修寓言詡詡言詞巷陌兒傾心反目易安危可嗟香盡蝶猶戀誰謂機萌鷗不知寥落丹青秋後扇縱橫黑白局中碁料應主意非疏賈其奈難祛絳灌疑五言長律詩一首追詠西湖行樂寄傅清叔聞借侯家宅湖邊度夏凉鐘魚連梵寺雉堞傍城墻間適心無事清和日正長藕花雖尚稚荷葉自多香苦笋回餘味青梅弄半黃生綃畫團扇細葛製輕裳水近風生座簷虛月滿廊龍舟花槳榾騮馬紫絛韁竟日歌聲沸通宵水面光不妨投轄飲更稱靜琴張詩社聫行卷仙姝學道粧英遊伴王謝清夢到羲皇曾約陪遊蓋慚稽動客檣憶君徒悵望為我細思量幾度吟成後憑誰逺寄將意多收不盡事鄙每牽忙今夕微醺起中宵捉筆狂浪吟無次第聊表未遺忘七言絶句詩二十五首九里松馬上作九里松株不斷青松風上發下泉聲耳邊為愛聞天籟故約遊韁緩緩行送客素娥懶駕水晶輪此夕飛來夜欲分送客出門還獨立一天清露湛無雲臨安客中小樓面面著疏櫺靜有蟾光絶市聲讀罷離騷臨晉帖菊花香裏數寒更折枝奚囊金勒逗春行醉咏歸來隴月生折得生香渾懶向斷簪零珥任縱橫清明節近清明長是陰黃花問在麥苖深倦行却上髙樓望烟鎖前村一半林經過二十年前漫浪遊海天霜氣夜深浮竹窗夢斷聞雞處常憶溪灣塢聚頭南林張園凄凄寒菊委霜叢下有微吟腐葉蛩倚著欄干聽不了自來我輩最情鍾種石菖蒲少年眼力健觀書卷裏千言一覽無官事簿書昏惘惘效尤石上種菖蒲蕙花光風蕩暖曉晴天雅有幽香入簡編尋見野花都不是山蜂引到石崖邊夢回㸃㸃桃花短短墻雨聲徹夜響回廊覺來蝴蝶家山夢一半分明一半忘贈術者紛紛塵土簿書堆職在其間怎可辭不向先生問榮達但言何日是間時買硯碑鳳城凉雨新秋後幾處朱樓試管弦有客貰金收古歙短檠竟夕自摩研恰在貰金酬硯直又逢古洛蔡公碑摩挲不忍教他去笑殺典衣償直時問梅寄賈秋壑先生生成欲見化工功不在漫山桃李中為向梅梢問消長地寒先却得春風天平方丈梅下見持要舊題枯梅一樹半斜欹繞匝行行欲詠詩忽覿季難遺墨在西風吹淚滿髯絲謝送牡丹官舍無花甑有塵縱將畫展不如真若非折寄珍珠顆幾是蕭條過一春蘸蠟封枝翦處新開奩帶露尚精神洛陽路逺風塵暗腸斷應無做譜人髙渭南席上燭照牡丹髙燒燭照御黃衣疑是沈香夜宴歸固是不教花睡著只愁驚起露蟬飛日午猫晴一線時紅嫣紫媚正猖披爭如絳蠟通宵照玉葉金鬚色愈滋題玉川月蝕詩後哆口搘牙月蝕詩遺編讀著凜風規如何晚節從汙合竟與姦臣血作泥題趙大年小景霜輕榆柳未全黃兩岸菰蒲洲渚長鷗鳥背人飛撲漉西風嘗是入斜陽一行白鷺過前山飛去沙鷗半復還更有精能君見否黃鸝兩兩緑楊間客中思家微風過處有清香知是荼䕷隔短墻相得故園成索寞詩盟誰復為平章楚楚輕衫翦薄紗而今憶得在山家蕭娘為是親蠶事嗔帶含香紫笑花柳絮悠悠拂面輕隨風到處若為情西池應也無人到一面青青萍自生詩餘過天下第一江山呈何守沁園春許大江山鎮臨彈壓豈小任哉從嶓冢導漾東傾注海截然限止南北天開試向中流回觀鐵甕萬石層稜攢劔堆金焦峙號紫金浮玉捲雪轟雷君侯文武兼才天有為生才南國來歷二十年籌邊給餉上流襟要幾為安排今此雄藩精明笳鼓又喚金湯氣象回長淮北望中原非逺更展規恢巖桂和韻鵲橋仙明金㸃染枝頭初見四出如將刀翦芳心才露一些兒早已被西風傳遍歸來醉也香凝襟袖疑向廣寒宫殿便須著箇膽瓶兒夜深在枕屏根畔賞春沁園春曉上畫樓望裏笑驚春到那家便從臾間情安排醉事尋芳喚友行過平沙最是堪憐花枝清瘦欲笑還羞寒尚遮濃歡賞待繁英春透後㑹猶賒歸時月掛簷牙見花影重重侵寶階銅壺催箭獸環橫斜濃斟玉醑芳潄瓊芽步繞曲廊倦回芳帳夢遍江南山水涯誰知我有墻頭桂影窗上梅花客中感春朝中措擔頭看盡百花春春事只三分不似鶯鶯燕燕相將紅杏芳園名韁易絆征塵難浣極目銷魂明日清明當也栁條插向誰門前題好事近春早峭寒天客裏倦懷尤惡待起冷清清地又孤眠不著重溫卯酒整瓶花總待自霍索忽聽海棠初賣買一枝添却初任官所為慈闈夀感皇恩官小宦遊初清貧如舊小簇杯盤旋篘酒雖然微祿不比他們豐厚也知慚愧是皇恩受富貴千般享之惟夀心地平時到頭有摩挲銅狄祝望比他長久鼎來榮貴待通閨後次任為慈闈夀感皇恩本是年慈闈六十二嵗命後一年也一百二十年兩畨甲子前畨風霜飽諳矣今畨甲子一似臘盡春至程程有好在應慚愧莫道官貧勝如無底隨分杯筵稱家計從今數去尚有五十八生朝裏待兒官大做奢遮㑹清涵萬象閣風流子望極思悠悠江如練籟息浪紋收看帆卷帆舒往來征艇鷺飛鷺立逺近芳洲遊波不舍山常好祗白少年頭杜若滿汀離騷幽怨鴟夷去國煙浪遨遊江南知何許青林晚山斷處白雲浮懷古慨今誰人似我間愁嘆醉生浪跡鱸鄉蟹舍殢紅怨粉蓮棹菱舟敲遍欄干默然竟日凝眸春日詞花心動春外祖中司常公春日詞曰庭院深深日遲百花落盡蜂蝶稀栁絮隨風不拘管飛入洞房人不知畫堂繡幕垂朱户玉爐消盡沉香炷半褰斗帳曲屏山盡日梁間雙燕語美人睡起斂翠眉强臨鸞鑒不勝衣門外鞦韆一笑發馬上行人腸斷歸近日風雅遺音多譜前賢名作因效顰云庭院深深正花飛零亂蝶懶蜂稀栁絮狂蹤輕入房櫳悄悄可無人知畫堂鎮日間晴晝金爐冷繡幕低垂梁間燕雙雙並翅對舞髙低蘭幌玉人睡起情脉脉無言暗斂雙眉斗帳半褰六曲屏山憔悴似不勝衣一聲笑語誰家女鞦韆映紅粉墻西斷腸處行人馬上醉歸初改官為慈闈夀驀山溪幾年修績總待榮親老每羡阮南豪向夀席花花草草如今慚愧微勝十年前聊爾了辦杯盤一對慈顔笑願親强健緑髮長長好來嵗在琴堂想凡事應微熱閙契天交道只辦好心腸官儘大儘榮親待受金花誥怨别驀山溪桃花雨動測測輕寒小曲檻面危欄對東風傷春懷抱酒邊心事花下舊間情流年度芳塵杳懊惱人空老粉紅題字寄與分明道消息燕歸時輾柔茵連天芳草鎖忩孤影夜卜燈花繁清漏斷月朦朧掛在梅梢裊
