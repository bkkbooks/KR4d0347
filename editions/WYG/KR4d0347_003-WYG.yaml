body:
  text: 彛齋文編巻三宋趙孟堅撰序凌愚谷集序文章至唐而體偹其情態宛委肌理豐澤腴而宻婉而麗斯亦世代至此而盛乎故自貞元元和而上李杜韓栁以至乎長慶元白皆唐文之懿也大中以降瑣澁滋過固一病也而又浸滛於以俗為雅之流代號作者或不免是况浸滛於末流者乎杜荀鶴於詩接五季之碑碣可槩觀矣然則論唐文者不得因其流而訾其源也皇朝文明代興慶厯以前六一公歐氏未變體之際王黄州范文正諸公充然富贍宛乎盛唐之製亦其天姿之夐已脱去五季瑣俗之陋一陽動於黄鍾厥維有本伯長一倡尹歐仲塗和之南豐三蘇又和之元祐諸君子又和之轟然古雅至淳乾尚餘音韻其風稜骨峭擺落繁華亦一代之體也然夷清恵和各隨極至塲屋習勝視唐疎矣孟堅晩學毎竊有志初筮葛溪司征愚谷凌君雲日從遊處出其所業何其不蹈於塲屋之習歟為余言曰先君子藏書滿樓金石遺文之富不愧六一之千巻惜乎祝融煽灾靡有孑遺然如印印泥胷中所存尚猶燈下千里故人面也曰噫行沅湘者率能道芷蘭香草之異目所經者如是乎子書雖灰胷中有不灰者在典型其有自夫以其言之渉唐也亦得之金石云爾故極道世代而歸其編趙竹潭詩集序詩非一藝也徳之章心之聲也其寓之篇什隨體賦格亦猶水之隨地賦形然其有淺有深有小有大槩雖不同要之同主忠厚而同歸於正自賡歌國風雅頌而離騷皆歸於正之詩也杜工部詩言愛君憂國不失此正所以獨歩於詩家者流也由漢蘇李五言建安七子晋宋之清虛齊梁之靡麗至唐而歌行吟謡怨歎詞曲等此而律生焉詩之體備而詩亦變矣然忠厚而歸於正者未嘗絶響東莱麗澤所次是已今之律體是特一耳非謂詩之能事止於是詩亦豈惟泥體不究其義哉其發也正則演而舂容大篇忠厚也束而二十餘字亦忠厚也砌景於一聨夸姸於一字無所感發詩豈然哉寳汝吟律精工參之唐人可也余望寳汝不止是其廣充吾言合於乃祖得全之義則思過半矣送海鹽王尉序辛夘冬有客至鄉郡者語人曰吾待海鹽尉次𤓰時縮至吾督迓諸此也及明年夏之是官者乃孟堅同登州趙君耳後三年嗣至者上饒王君耳竊訝焉既而天都值前客訊之曰曩謂及𤓰奚尚尒邪曰曩聞前轍弗留今彼無恙且上矣吾須焉未幾王君以臺評劾劾之章曰貪也其嗣從私貿也賂於郭而受於吳也訟於倉佚罸於憲也孟堅讀之髪聳堅曰王君章泉澗泉里友也見聞如是為如是夫及詣邑見里大夫若士則喟然以歎見吏若民怛然以戚環而曰尉去非其罪孟堅曰臺評誣歟曰評非誣風以聞者以之誣耳王君謹約俸入絲身糓腹弗給弗顧也貪歟二子偘偘詩禮踐弗逾閾孰私貿歟郭與吳亡是公賂鬼輸歟倉憲牘無攸稽誣非歟曰王尤若之何而若為是誣以誣臺論噫一官而三人共之其汲汲也舊矣天定能勝人昭昭者在矣庸何辨姑飲王君酒大書以侑其行曰端平三年冬十月丁未海鹽尉王君從事以御史風聞劾罷李特卿以次來赴嘉興司法㕔題名引序墨曹司一郡刑章出入獄雖成于彼生殺輕重則一定於此金科玉條程凖權衡斯在吏姦不得一舞手足請屬不得以致軒輊據案氷清閲實讞状矜荘恪祗凛乎明神鑒前清議臨後也引據一差毫釐尋丈况以私乎私吾無徇矣明者過察不知入於刻也昬者受蔽不知流於弛也縱惡罔悛滛刑匪戾厥民何辜上天有鑒嘻其可畏哉禾興於今為翔輔民藂事萃詞牒猥繁曹掾在選不輕受涖而能聲易昭前兹壁未有記何以示能不能邪宗叔崇儼來謂不可於諸曹獨闕典諗諸同舍妷孟堅属詞以肇題記自某年某而昉具刻今而後至若替畢書非但誌月日姓名也能不能於是乎觀是為引也然程準誠陳權衡誠在髙不可下重不可軽固然也舉而行之則不在我亦所遇之何如耳孟堅曩尸臬事且攝墨曹以至令越但知克審然平反嘗得以甦枉而嫉惡或有以招尤遇者然不遇者然也遇不遇人也能不能我也不以人而易我其斯無負厥職乎孫雪窻詩序詩者英氣之發見於人者也鄙夫猥徒定無詩髙人韻士有詩名臣鉅公皆有詩感遇事物英英氣槩形而成詩亦猶天有英氣景星慶雲地有英氣朱草紫芝是也然何嘗體製限哉竊恠夫今之言詩者江西晚唐之交相􅀈也彼病此冗此訾彼拘胡不合杜李元白歐王蘇黄諸公而並觀諸公衆體該具弗拘一也可古則古可律則律可樂府雜言則樂府雜言初未聞舉一而廢一也今之習江西晩唐者謂拘一耳究江西晚唐亦未始拘也鴛湖雪窻孫君志古工吟持編過訪嘉其體備而不時世粧也因與之言雪窻其感而寓興以有韻之文舂容大篇北征廬山髙其行軰乎精宻簡短秋浦其流麗乎載揚古風一洗靡習吾其望子記海塩縣重築海塘記吾邑在郡東偏㝡為瀕海市洋相距纔二里而近潮汐侵尋隳疆妨稼在所必葺前兹土築雖頻若夫圖功永存大施䂓畫其属吾史令君乎君名亞卿字景聖太師越王曽孫也勁敏爽特遇事鋭心庚子嵗同入西憲幕癸邜又聨臚班見知君最深甲辰冬兩易此來毎遇邑人胥慶得賢令也天基節諸邑簉祝聖班粤翌日鄉校職長常賢孫等過余言曰海塘為吾邑至急務惟工力弗固則隳圮隨之去嵗風號扇威推巻斥鹵大􅊣穡事人幾為魚今史君下車亟是營度以修以創知先務也邑人徳之學校士議政善否刻記以聲令能冝先齊民慄承一不敢懈偃然虹垂成於不日工役有經一可紀日役千丁旬幾再浹縻粟給劵一辦公家不配於下不請於上隨用以給㒺見乏使當帑庫赤立之餘旬月乍至之始咄嗟以定見謂如神築地所經或當民産倍直給酬了無怨咨又捐圭粟嵗儲千石掌存邑寓以備修防措畫有方二可紀有二可紀子尚奚辭乃即而比次其委因諗言曰威名方畧非可强選人才如奕棋舉手可知優劣斯言惟允夫奕以取先為勝著子邉隅誰非計勝當先而後事斯左矣今君未遑有他節損浮費汲汲務兹既堅既固又圖永存斥鹵以防穡事用乂豐穰洊卜域内咸熈而後治吾教條沛吾膏澤學道愛人斯為有本孟堅行亦令邑雖秦越不侔政之後先則莫敢易謹頌君績以示永傳景行行止抑以自礪若夫鋪張􅁔頌里有丈人比方聲揚繼兹藹若鄙又何敢曰盡能事徳清縣平陽嶺興善施水庵記繇邑而西路委蛇行五六里嶺曰平陽路直􅀴嶺上車徒共由徃來負荷登渉斯勞憇倦舒息咸于是而休焉其或日向炎雨驟至舊未有所蔽障也昉淳熈甲午道民丁妙超募縁買地嶺上結菴以居前跨通衢架凉廊列坐檻以便休者維夏之月則注湯瀹茗施濟煩渇人便頼之丁既徃僧妙崇繼之道民沈妙浄又繼之一踵前規以處應施妙净又募縁展地邉隅以拓􅂼圃加飾菴廬以崇像供里之善友沈宥徳軰為僧置翁家園田五畝以助其薪茗資可以乆濟人而不墜道民善友咸願刻石菴中以示來者期于無斁乃具其事属余叔新班君畀余為之記不敢以拙于詞而謝也既為序其實從而歎曰事惟非私諸已乃克乆而無弊僧廬塔廟主其事者前更後易非若室家之父詔子祖傳孫也然歴年雖百數而常修舉富家大族父祖經營勤勤詔後非不切至率一再傳而中否何哉此公于人彼私諸已惟公則不事事者不得以居夫然則若之何而敝之此刻石示後之意余為宣掲之将見繼者益勤助者益多徃來者益有頼豈徒誇能事哉余為文又為之書因請余叔以𨽻其額五洩禱雨記五洩龍祠在越諸暨西境界接星婺號小鴈蕩亦東淛名山也唐賢逮國朝先逹題詠多佳句其叙山川勝槩及龍神靈異則未之該也余為令丙午值旱七月二日躬禱祠宇時方勑賜廟號豐澤夕郎趙君扁字甚偉余黙禱神泉且言於主僧曰禱而雨當有紀果應甦濟将属筆余以御史風聞斥歸卧故廬明年七月仍旱暑風竹簟間追想去嵗禱祭經行之詳􅄒寄寺僧補山中闕文云繇邑西南行歴大悲寺次陶朱巖西向半里豁見通逹平石坦布天成匪由甃砌逾三里無掬土纎草右松林而左石澗澗之左石壁層疊漆黒水絲絲下注經之如簾松風水聲夾道隨送不絶又西向當鷄籠山翠峰崔㟴白雲聨絡無論隂晴竒變常新它山縱有雲象輙復散去此山雲氣無窮觀也是日出郊㣲雨漏晴朦明掩靄輿行折復互見尤竒由此西行大溪中二十里石子甕盎磊塊皆白色以旱而然中僅一衣帶水渉脛而渡回望東岸叢篁蓊翳石壁屹起挿脚清溪直上百尺鱗疊方整若城塹若搗砧􅉹堵䋲引行二百許歩無纎差若謂天然胡能爾整謂人為厥豈易致駭視歎尚欲刻號疊石壁三寂亦弗及也自是竒峰互呈拳擎髻擁螭蹲鬼獰㳂溪引路九鎖而入越十二里無居人詣半地祗祠禱必先告又二里次外龍洞又二里次裏龍洞洞門皆在山腰仰望隂閴靡測碎石紛委𤣥圭蒼壁角銛稜鋭新若墾斵儼昭異物攸居爬扴下委二洞出雲一黒一白禱已雲氣騰空合乃降雨又二里抵寺門細泉淙潺隨歩聼之醒冷謁祠宇古木障天巔崖欲仆隂曀増怖拜祝已入寺昏鼓動宿憇遲五鼓告佛殿告祖師堂初由天旱師謂西潭青蛇曰旱暵滋甚而弗行雨安可諸蛇首肯飛空乃雨故禱必先焉乃詣東源由寺西行向北山圍壁峙屏折灌木蒼薈靡知上極泉自頂來五節故曰五洩云然可見僅三耳中節又㝡峻弗可詣陟别峰望焉斯及禱祈官吏至望瀑布從石壁飛十餘丈如懸練衝激一潭若翻雪噴霧着人森寒猶曰旱爾積雨更烈望瀑設褥位陳奠祭拜跪瀝酒讀祝辭屏若聼伺端笏跼蹐僧梵颺聲震撼林谷數刻乆愈懇至從者覿伺金線蜿蜒出水中盥具迎接斯上長三尺餘首尾如一官吏拜迎致佛殿奉安已乃詣西潭亦由寺西五里行溪中水盡涸易小輿﨑嶇履石子如車輪如伏黿苔封凝滑著脚殊難兩崖樛木垂籐蔽晦窅不見天豐草腰齊蛇虺豢宅疑畏殆莫可属歩間亦埜花清芬細蒲㳂石幽夐自暢行方半前驅言已得小青蛇盖西潭靈物皆然率龍子龍孫也仍詣西源拜奠祭祝如禮羣山互來奔湊下瞰枯木幽篁尤極寥閴禮畢奉安五夜演揚梵事詰朝迎導歸邑三日雨應差官送置靈物歸潭此余躬歴然者若前權縣事丞趙希恪所上朝廷乞封號述詞尤彰謂方拜祈西源青蛇睍潭中三接三不就問從者駭曰蛇在祠官靴褥際矣為尤異孟堅曰龍􅂕而神者也神正直而仁者也其呼吸風雷發施雨澤彈指頃耳胡不常雨必待致禱乃示威顯何歟豈巻舒虛空出入溟海化㣲而著憚厥勞歟抑禀司帝命曰雨而雨不敢擅歟抑民之無良不昭䕃佑必底艱虞乃救之垂死歟抑横目不仁黨姦蔑善有致札瘥宜以延其殃歟不然有龍爾􅂕宻在近比而流金爍石奚此地之頻歟併記以昭神􅂕以示警戒諸王孫趙孟堅子固記沂泳亭記昫山丘君令海鹽三年政修事舉百爾具興冩琰紀麗洋洋其聲顧余弗葺一詞以皇令君之昭庸余則有愧八月既望别君景魯堂上君曰縣庠沂泳亭成吾𨽻掲扁已寮寀徐君諾我以記行勒石子盍書丹子書吾志也余唯曰敬執筆伺時徐君從檄洎冬未旋一日晴曦宛春余散歩歴亭下短墻紛鮮平橋欄整翠篠匝外漪漣暎前奕奕新亭屏若與􅂕星對峙三楹數椽不豐不殺面列踈櫺亭亭愛日覆蔽洞户䬟䬟凉颸卉木行拱石甃䋲直媻姍勃窣不覺㣲吟身履鏗爾之興作焉展如斯亭名之允也儒學分邑之陽望㕓居甚遼修廊廣廡幽夐塵絶諸生祭奠則聚齋饗則聚講説課試則聚領䄂職長業以既精又不假朝夕視也則虛亭永晝静定融怡領畧盖寡余方任戴冠負䇿遊修竟日洛誦倦則寐醒復誦稍厭端居執書周行時亭未建地属邑民周氏毎倚徙橋欄上自鑑清影唔吚乆之或東行數百歩登浮天海樓浩􅁔長望至暮濤浴金而罷窅莫我和販夫樵人麕顧駭視今令君不恡重費市地結亭以遺爾士觀賞云乎哉爾士之業章句云乎哉蛩聲蠡測腐耳踐履之學心融景㑹契叶神交一貫之悟不吾欺也今蘄爾士意其厚歟吾徒孰蔵斯息斯孰游斯泳斯㸃爾何如志孰同斯有徳有造孰不負斯不然花畦藥欄囿斯可矣學何謂邪余懼孤令君意姑叙以告若紀作興之詳日而月之則尚伺夫徐君也噫清風明月光景常新果終孤君乎主張是者寛其來厚其飬皷其氣其不自君乎君名來字少潜興聖寺蔬地記嘉興興聖禪寺實孝宗紹統同道冠徳昭功哲文神武明聖成孝皇帝育聖之地也嘉定初元邦侯趙公希道以安僖曽孫始奏建寺事見太叅樓公所撰碑銘為詳然既頻年産嗇用慳法未大振雲集盖寡用既弗給雖巧奚運洎寳慶丁亥秋風水扇灾寺益大敝貳車任公良弼預董寺事申請公朝求命主持於是以冷泉上首虛堂智愚來至之日上漏旁穿隳廢滋甚愚力加振䇿以經以營逮二三年漸漸修舉殿宇廊廡丈室堂寮鼎更輪奐餙尊像冶洪鐘乞蠲租産之苛擾者亦既善矣獨雲衲二處齋蔬所供無地取植是大欠闕粤有檀信女氏戴净覺自號悟菴道人者偕母氏王妙真以城闉強巷地來施廣袤十畝餘歸我法界遂得雲鉏露鍤紫芥青松虀茹供湏受用俱足愚嘉其施求文以刻諸石余鞅掌官事未遑也近從檄來歸因謁愚及山門則宏闢端峙又非曩時委蛇隘束比流虹聖地鉅扁髙懸邦侯麗畵斯掲則知愚之勤勤斯寺有足尚者侯由是加主張焉請併紀愚否曰記以蔬地名貴專不貴廣也余曰不聞坡公參寥之辯乎供者幻也受者幻也刻之者亦幻也夫以石作供供受刻皆為幻今捨地𨽻扁皆非供乎供皆幻則於受也刻紀何擇何莫非幻亦何莫非功徳何専廣之別邪且僧廬塔廟塗金碧而侈浩刼者求福田利益也維兹發祥闡􅂕實皇天降康有宋篤生聖人用宏中興之丕業赫赫皇皇軋周漢二宣而上征則増崇而􅂋飾之者為知所尊尚其但福田利益已㢤余既掲是意将見樂施而至者不但一戴也愚曰諶哉記捨地已耳君而推明及是人知嚮以勸矣廼記侯天姓與籌其名徳淵其字太師成公之嗣愚明之象山人亦彼法中之精進不私者其能爾有以夫耕讀堂記甲子年中過湖北汝時一字全不識今年携汝過湖南也學時人弄筆墨顔筋桞骨徒爾工島瘦郊寒竟何益勸汝耕田勤讀書豐公非是無官職此故合肥帥時齋趙君示子詩也子為誰璧玉汝也其示為何方嘉定甲戌君赴益陽道經玉山玉汝年甫十有五題詩客舍君喜而有是詩也所題云何曰滿地楊花雪不如緑隂叢裏一茅廬觧鞍呼酒邀春住地主欣然接敝車十有五其能若此宜君喜也玉汝今於居之堂摘末聨耕讀二字以昭扁志不忘也孟堅曽外祖中司常公與豐公俱以正論入紹興戊午黨議二家姻好尤篤孟堅亦預𤓰葛之施方北來道過門玉汝邀示堂扁曰此右司陳君仲方所𨽻且誦二詩屬以記固弗應辭然簿書鞅掌率未暇頻書以督因詩有感於二公也乃愓然言於玉汝曰先君子勉玉汝以詩翰弗力拳拳耕讀可以意逆志夫事不如人意十常八九當建紹初年天欹地拆諸君子出死力欲與國家復境土雪兇讐心通於天姦檜以一和字掩遏之諸君子阨窮以死不獲伸以息氣豐公尤烈也先君子踐家學半生﨑嶇兵間當邊嶮偹嘗艱危者累抑非無功於時者方嘉定間乍􅂋乍晦亦莫展盡志之難行也如此夫當不遇之時毎有獨善其身之思惟耕惟讀期清白紹屬不於藝文榮逹者豈無意哉既又歎曰我祖豐公豈無官職者其所遇何如味斯言也可以長太息也玉汝其悟已夫其驗諸身而益信夫嗚呼不能側媚不可以干榮不崇苞苴不足以媒進同聲濟水者為得計摸稜首䑕者為趨時遺君後親倒亂曲直者斯不刺俗眼也心乎先烈奚怪落落力耕勤讀計之得耳妄窺先志以訂所安以慨凡百雖然三江五湖風石之竒不激不發繼今讀書愈多成就愈大時清明矣豈乆耕於是哉時齋諱綸豐公中興名相賜謚忠簡侑享清廟封其食邑人仰之如此知臧孫有後故併記而不以名書狀謝安吉使君黄寺丞先生京状孟堅伏凖照帖舉孟堅明敏有文強毅不撓充改官親民使者京洛識機一見已䝉於厚顧輔藩薦禰三生即信於良縁恩恵彌天謝誠跼地伏念孟堅最為好直秪欠學圓獨奮孤寒頗歴風霜於早嵗自期節義願為砥柱於頺波凡是素心不入時様㣲如字畫猶考偏旁寓在吟哦亦闗風教以此移於吏事㫁乎不敢私心當繡使之行䑓借階抗議勸大家之發粟力救時荒甘食蘖以守亷束濕薪而馭吏蘭薫同臭渭湜殊流不圖末路之榮獲遇知音之舉載惟合頴尤重常員判分京選于天淵頓生功名之羽翼矧陳力之未乆便刮目以誤知槩彼尋常誰其特逹兹盖恭遇某官超然逺覧卓爾逹權自専衡鑑之公取于尺度之外属方建府首急揚材苐慚借譽之言幾于許可之遇斐狂有作正虞所擇之未精操守無移或病執古之太甚文乎何有敏又安能被寵兢兢持心惕惕在春風之下同桃李之無言歴嵗寒而觀期松筠之勁節謝發運權憲節齋先生京状孟堅伏凖照帖舉孟堅志尚博雅才能卓異靖共自勉職業可期改官親民任使者歴事霜䑓夙䝉賞鑑一封露剡迄藉吹揚終昭衡鍳之公倍感孤寒之跡示先寵于臨發申勉礪于将來加意玉成戴恩天大竊以脫選湏五奏剡在今號甫登科属吏百十員誰無兾望間嵗一二舉得甚艱難于常員已自不輕矧職司所係尤重合淮浙而分部盖英俊之如林求者非止一人之懇祈得之可定半生之榮悴允非細事豈易畀人如孟堅者渉世殊疎信書過甚孤分獨立凄其寡鶴之無羣周章費詞幾于畵蛇之添足粉飾修治了無時様巉巗屼峍惟有古心出手辯寃獄之誣活數命于垂死歴階抗部使之議獲一頋以囬榮是皆拙計之勞身第招冷笑之氷齒誰分䑕璞自晦龜蔵溝木忽被于丹青㸑桐獲調于律呂兹盖恭遇某官道徳純一識見昭融禮樂詩書容止可度文學政事體用兼該撓不濁而澄不清言有法而行有則作屏壮維城之勢飛蒭著騰槽之謡雖遊刃之恢恢惜寸隂之亹亹粟賤已􅁔李峴衆既傾心迓衡行相姬公即歸調鼎猥収么瑣預備使令嗟人心好尚之殊有衆口鹹酸之異不隨愛惡以石轉重増感激而涕零重念孟堅奮身艱勤立志警䇿齠年家事窘垂磬之屢空子夜書聲惟短檠之相守雕鎪肝肺収踐科名摻履素危行已應謹苐為任直而磊砢不覺或越乎凖䋲仰兾包荒少加容飬庶幾展布有所報酬孟堅敢不䇿蹇忘疲磨緇尚白期無行已之玷上負知人之明使君忽敬其朽株幾于輕予忠臣益彰于勁草請驗将來謝安吉謝使君飬浩先生京状伏凖照帖舉孟堅吏事敏强風猷清雅明于折獄多所平反充改官親民任使者古心雅尚素云臭味之同春首薦員不由介紹而得自知歴歴叙謝拳拳伏念孟堅朴甚不華直而無倚祗招譏誚于流俗敢忘榮逹于今時第貪便親來厠猥掾我心不轉恨未學圓横目何如烏能識直忽遭逢于舊識來牧守于輔藩預知屈蠖之得伸曽作薦鶚之妄想然讞議論難如諌諍而争是非而聼受舂容若父子之相唯諾已多寛假况望明揚雖甞持莛扣鐘敢必取葑下體春風委曲亦到山家寒谷暄和頓有生意亶兹寅幸信有縁由兹盖恭遇某官見與世殊道同古契髙飛逺舉寜同燕雀之啾啾表瑞開祥即振鳯鸞之翽翽有大用之斯在豈小試之足紆杗桷兼収規模甚廣坐令么麽亦竊生成敏事安能正恐囊錐之嫌露清猷知慕慚向蛾眉而效顰孟堅敢不力守恪誠永堅報效斟椒花之酒已欣逢嵗厯之新入藥籠之儲今的在門生之列謝泉使賈秋壑先生京状伏凖照帖舉孟堅持身亷謹治獄詳明充改官親民任使者干薦崇臺蠡􅓽施於測海奏員末掾冶遽躍以範金不煩介紹以知已之深預定揄揚故先期而與念孤寒而備至感恩紀以尤多竊以知人惟難當熟察于平時薦士有權貴自决於獨見故聖門特著聽言觀行之訓在近世始有因人成事之譏匪移集以權勢之臨則假借于交朋之助甚至未嘗覿面若何盡識操心舉之者非所樂為受之者邈不知自取與已乖於理義報酬何有於功名此舉世以皆然獨先生而不爾焼玉三日滿歴驗量才㧞茅連彚征皆由定見如孟堅天支末裔苦節癯儒面墻獨學于窮鄉艱辛備至食蘖自清於宦路純白無緇凡著微勤夙䝉洞鍳鴛湖詩社蚤憐螽趯之鳴畿漕幕評旁照蓬生之直薄知采下體於葑菲敢為撼大木之蚍蜉一干薦塗輒被衮字是謂嵗寒有髙節宛見春風不世情衆稱公舉之無私孰識知音之有素兹盖恭遇某官心同古契見與世殊視富貴如浮雲惟崇勲績㧞才猷于脱頴共赴功名開明堂之丕基取朽木之寸料圜府已恢于國用化鈞行運于台司臧否素昭陶鎔應偉苐膺過譽彌切厚顔孟堅敢不佩訓如規因褒知戒守亷愈謹畏楊震之四知讞辟加詳重唐宗之三覆誓終如始報徳與恩蘋末起秋風行快蒼鷹之砉逝梅邉問春信果占鴻造之無私謝倉使吳荆溪先生京状伏凖照帖舉孟堅文學自将智能兼茂充改官親民任使者上介充寮曽微纎助首秋薦額僅為盍簮寜遺平昔之心知特了孤寒之身事彌天恩大跼地謝深竊以五剡固重於攅花寸禄尤難于及戍待逺次者則動渉數嵗非勢援者則坐過千㠶未聞辟置于連月之間便即纒裹其脱選之事况無介紹自出生成信為卵翼之恩殊多覆幬之造兹荷幸遇奚既頌稱孟堅真無盖藏樸不㳂飾信情而往幾擿埴以㝠行矢口而談不瞻前而頋慮累㕘寮于幕畫毎取誚于時流幾欲揉裁終然率鹵拳曲擁腫可憐難入于凖䋲容受包荒卒從下采於葑菲得於兾望之表倍増感激之私兹盖恭遇某官哲鑑覃昭公衡平一來從蓬苑益振文風肅駕綱輪凛甦吏習為矜烏哺之至念蚤飛鶚薦以先成恵纔西風而馳主由東道者力矧崇褒詡更侈品題不學面墻文何由進無能守樸智又奚長孟堅敢不力勉修為事加警省期於有立無負隆知悠悠斾旌少緩朝天之濶歩隂隂桃李庶幾指日以成蹊剰有輪囷之情尚嗣再三之謝賀節齋先生除京尹状恭審渙錫宸恩晋陞尹正夏卿望重特髙九棘之崇班日畿權尊庸旌三輔之善政上倚任以甚力人歡傳而振聲恭惟某官充碩粹容堅凝定力有來翕受廣海納於百川守節不移乃壁立於萬仭勤惜寸隂而靡懈㢘愈氷壺之洞清昔時畫㦸凝香咸謂三吳之富樂去嵗齋壇禱旱獨殫一已之焦勞能於歉束之時交修内外之務貔貅列竈蒭輓流通鴻鴈庶民粒食贍活至捐百萬緍之羡帑代輸六縣户之常供如斯損己以裕人允是光前而絶後頌騰衆口簡在上心陞除糾正未足以盡寵嘉兼賛彌綸未足以寓奨眷惟是浩穰之都㑹其誰寛猛之適權但觀右翊之乂安可卜中邦之化洽式煩彈壓益懋勲庸細民望恵若慈保之臨豪家怛威若嚴師之至謝陳文昌退菴先生舉科目状孟堅伏凖照帖舉孟堅蚤著文聲志追古作嗜學不厭屬籍鮮儔可充學問該博可備頋問科者蚓竅微鳴謾呈薄伎龍門定價慨動賞音不惟掞送以箋天抑為揄揚於當路復見前修汲引之盛意倍深常人感激之私情伏念孟堅尅苦寸心孤寒弱植蹈仁泳徳第期為道義之歸含英咀華非但求文字之巧時感慨於遇事偶歎詠以形言恠竒祗以自嬉紀述亦惟實録棄捐不忍藏積猥多固自識於非才初何敢以上逹眀友引類菅蒯俱前匠石無遺鑑衡俯逮忽加青盼以誤及有同朽木之取材名重十科過許備承於詢訪言逾九鼎更加賛援於澄清庸昭所取之必端預卜名揚之有及鹽車皁櫪頋伯樂以増榮蘋末蒼鷹逢三秋而必奮驟感品題之有及不憂筆硯之無功益謹磨鈆仰符采菲兹盖恭遇某官眼髙四海氣振羣英道雖大而能容徳好謙而並受行運化於陶鈞之上為世作程不忘君於畎畆之中薦材是務既揄揚之已力於從㬰以尤勤畀薄效於攻文庶共趍於向學孟堅拘攣古格方嗟不合於時宜附䴡宗盟正愧未儕於士齒淹博何有頋問奚堪惟礪勤心仰酬知已功名文章為差乆益務磨礱論思獻納以輸忠少圖建立赴建康幕通海陵趙使君狀擬從軍之詩已専餞禮脩通名之牘敢廢駢詞惟齋扉既隆親炙之情於文書應畧苛儀之贅緘言近率論心則真恭惟某官才疏以通見審而定在青衿之列好問能謙當皁囊之馳慨懐勇徃歴十年之日月當三邊之風寒人謂艱哉君毎安止待偉績之斯著駕脩程而上征既分民社以位屏星旋搢朝紳而列侯土兹勲勞之應爾奚歆羡之多為於兹更加經理之功正爾大作功名之㑹招兵耕渭築壘浚濠守則為金湯之堅進則復土疆之舊此君侯方畧之素定亦小人賛助之當為雖無膂力以彎强弓粗下工夫而學飛檄絶利一源收功百倍得道多助乃集大勲願殚力於毫絲賛崇庸於彛鼎孟堅磨礲鈍魯宣礪精誠豈敢以越幕殊塗不擬以纎塵足岳慨誓心而自此投𦕈已以為君恪聆驅䇿之條共圖備禦之計同姓衛國如䕶頭目肯致赤心功臣受誓盖等山河相期晚節冀酌權衡之時令益調鍾釡之天和式賛中興有光同姓賀秋壑先生除縂領仍兼泉使状孟堅恭審寵陟餉師任兼治事班穹藏府分命盖重王人職總利流理財其惟君子自天渙汗振地歡聲竊惟財計登耗之攸分盖自事權歛散之無統職幣於内者未諒軍需之調度轉餉於外者不量國計之羸虛彼此不相為謀肥瘠各自殊志惟専一其任而量入為出斯洞究其藴而養源節流通融斡運於一心銷弭滲漏於百弊此自古設官之未逹幸于今申命之合權矧属通才可占成績恭惟某官國之貴戚世之鉅人以肺腑之親則體念也専圖鼎彛之勲於富貴也薄慨懐銳志展在顯庸明燭秋毫老吏為之辟易計殫鞭筭舉世伏其䟽通比借重於筍班施活法於圜府已驗泉流於地更欲馬騰於槽乃兼餉冶之司兼屬經綸之手聿申新渥爰即舊勲加崇卿月之班式重使星之命翕傾輿譽知演邦財命相之自唐朝必兼鹽鐡冢宰之於周典亦式貨財共希明綸式驗故事孟堅受恩最切賛抃尤深秋以為期待入山公之啟地分殊部俄驚躔次之移方此兢虞旋還臨照福星仍守舊分合浦宛得還珠益昭夙幸之自天不間施恩之易地亟飛賀禮印定龍光想當移節之時正及上箋之日重念孟堅六考滿例五剡成尖的慿薦鶚之書不負操觚之藝千金逾一諾知東道之主堅六翮冲九霄覺西風之程稳赴淮東常平幹叅李制帥可齋先生状夙覃梓䕃隂受維持新事油幢的𨽻舉刺遡平時而載謝慶此日之欣逢思祗頌于公恩可自占于身計伏念孟堅勁挺獨立竒單寡儔委已隨俗則少得世縁受知逹觀則毎多天幸其所䝉于公者抑何侈于人歟齠丱從師已篤同門之學絲蘿締好更崇附莬之姻㣲吟不鄙其聲寒拙畫過嘉于心苦扁舟載雪以呈行巻逺驛貽緘而寄㫁碑作成者蓋歴數年提撕則尤多近日駸駸脱選種種蒙恩毎自感知夙深銘戴第棘寺未證平反之賞而淮堧又從畫諾之遊孰知于此機縁乃是就公纒裹顧一尖之合頴希萬里之髙風東道主固有周旋之心嵗舉員恐拘减省之額祗惟大府剰有薦塗與其從㬰諸人何如特逹自已念鶴髮親老望切倚門而鴈行助稀飬㣲兼膳雖向寳山而求藥亦勞蝶夣之思家儻其即次于明揚即可通理于零考頂踵一出大庇絲毫何假它求洞傾直忱亟祈慨與兹盖恭遇某官徳宇天廣淵裁鑒昭惟公無私軍民乆属于畏愛以寛濟猛中外盡讋於威名驅馳既熟於邉疆彌綸更多於省闥理内禦外以俱善出将入相以何難於昭異恩特任隆寄開大帥府號小朝廷即躋奠枕于周京入任調羮于商佐孟堅不慚婪尾力兾成身辭家鬢未彫豈遽作悲秋之賦從軍心固樂時或起白雲之思上都省乞行平反賞格状辯明讞議粗有助於好生投誠化鈞覬速成於脱選雖職守弗應於論報然朝廷嘗用以施勞有賞格之具存敢自陳而忘僣庸抒懇惻上兾陶鎔伏念孟堅單㣲孤蹤感慨直志虀鹽黌舍嘗沾教雨之濡菅蒯科名素出恩波之内竊禄将周於一紀下考幸及於六書獵渉文詞累塵薦牘狂狷論辯或與直聲将攅五剡之尖僅須一簣之進曩辱知於綉節謂垂意於丹書曽以鄰邦之疑詞下質管見於公鞫病死者荏苒連月自經盖出於無聊被屈者附麗數人文致過誣於謀掠依阿雖可唯唯隂隲其如冥冥殺一不辜尚且弗為於數重辟豈容忽視矧有鯨吏肆枉平民强加殺人之名有同指鹿之事悉為表前勘之承誤與夫明初驗之致訛牘上憲䑓豁從氷釋人出禁網重見春生若是勤䖍固多救正當路姑摭兩端而上常員第求一免之從雖䝉印證於公朝其如阻障於法吏但拘對罸不思失出之恩該固掩㣲勞莫表平反之功倍是謂屯膏而吝賞或者借公以報私兹謂忌心何有嘉善纎雲謾勞翳日掲蔀終獲見天幸旅進於賓堦因力投於鈞造兹者恭遇某官勲名赫奕事業恢洪淵鑒雖逺以畢昭寸長無㣲而不録禇公抑僥倖名器固弗假人魏相考功能片善豈令掩物罔徇拘攣之鄙大明激勸之權班召命以使前傾聽聰而逮下孟堅是用慨陳悃赤仰丐終成拔身選途奚限常程於薦格報恩末路誓酬國士之隆知上安吉使君黄寺丞状趍風部掾陳力未多干寵薦員捫心似躁惟已廹替期之近幸及遇賢轍之臨補掞公車纒褁身事值機㑹以巧的祈恩榮而敢稽竊惟遇主有縁論薦貴勇鄼侯方一見而竒信何須歴試以觀人坡公於将去而知滂盖以片言而得士蹔焉目􅊿即定身榮此前脩特逹之盛心為後輩干求之藉口因陳拊缶或兾采葑伏念孟堅雖拙賦材粗勤立志名浪占於瑶籍心加苦於韋衣虞學虀鹽垂成三舍禹門桃浪行越周星不辭奔走之波波第恐身名之寂寂自闗譏而叅計幕由曹掾而入憲寮粗以執方不隨趍下排豪家之勢復兩村占産而居之民雪寃獄之誣活數人枉戮而出之死動誤知於當路被公掞於連畨或稱博雅以詳明或謂敏强而鯁直花攅五削已䝉前守之照移月近初秋乃忽先期而去任滯留癡守逼迫終更顒迎日伺於雙旌有望山成於一簣曩雖際遇盻睞㣲加今者趍承工夫則淺惟精鍳之洞物豈常程之取材縳柳為車且送窮鬼栽桃與李䞉有春風况得之而遂脱選之圖若予此則異常施之比允為鉅恵寧可易云於焉儻拜于明揚信矣不虛於公舉兹盖恭遇某官軒昻偉量卓絶大官玉立顒顒有任重之器風聲肅肅示揚清之權慨欲立勲而立名博取有材而有藝收明堂之材具寕鄙尺椽開洪鈞之化規豈嫌躍冶孟堅不量么麽仰兾全成願被歸榮以終薦目及齒髮之壮日効犬馬以酬恩讞獄無阿果動知音之喜􅆒言有取願占合頴之榮
