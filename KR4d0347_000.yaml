body:
  text: 提要彛齊文編四卷别集類三宋臣等謹案彛齊文編四卷宋趙孟堅撰孟堅字子固自號彛齊太祖十一世孫其先以安定郡王從髙宗南渡家於嘉禾之廣陳鎮而孟堅自作告墓文中又作廣成蓋俗語相沿初無定字至元嘉禾志載廣陳鎮在海鹽縣東北九十里則孟堅當為海鹽人其或作嘉興者誤也孟堅以宗室子登寶慶三年進士好學工書喜藏名蹟時人比之米芾至今遺墨流傳人人能知其姓字惟其生平始末則諸書所紀往往不同如周密齊東野語謂其終提轄左帑身後有嚴陵之命是孟堅殁於宋世而姚桐壽樂郊私語謂孟堅入元不樂仕進隱居避客從弟孟俯來訪坐定問辨山笠澤佳否孟俯云佳孟堅曰弟奈山澤佳何既退使人濯其坐具云云則又似元初尚存者二說錯互殊甚今案孟堅甲辰嵗朝把筆詩有四十五畨見除夕之句以干支逆數之當生於慶元已未距宋亡時凡七十八年孟俯仕元尚在其後孟堅必不能及見又考朱存理鐵網珊瑚載孟堅梅竹譜卷有咸淳丁卯葉隆禮跋稱子固晚年工梅竹步驟逃禪豫自江右歸將與之是正而子固死矣跋出隆禮手蹟其言可信是孟堅之卒於丁卯以前更為確鑿亦足證桐夀之說為誕妄矣至其歷官次第他書不載而見於詩文自述者如為湖州椽入轉運司幕知諸暨縣以御史言罷歸皆歷歷可考獨不言其嘗為朝官宋詩紀事乃謂其景定初遷翰林學士又不知何所據也其集宋史藝文志不著録惟見於明祕閣書目者四册世久失傳今從永樂大典托拾補綴釐為四卷大都清逺絶俗類其為人剩璧零圭風流未泯亦足與書畫並傳不朽云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
