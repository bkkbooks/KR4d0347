body:
  text: 彜齋文編卷一宋趙孟堅撰賦吐綬雞賦嗟爾禽豢華彩之殊於羽翰表均圓而珠匪瑳匪刓密踈孰鋪鍾星精於蚌胎乃賦彩於爾軀固已不儕於野鶩逈間於飛鳬矣頥頷之垂更稟異質五色相宣有藏斯密乍展乍縮若虛若實彬然而彰以時而出此又造物者神其幻相不可致詰者也若乃藥階晝長蕙圃風暖茸茸草平細細沙軟日輪卓午花隂將轉飲啄既厭振刷微倦支體融怡翎翮敷闡百骸暢而自恣真閟形而莫掩撼首騰吻伸嗉迅膺乍露層碧中明錯金婀娜離披絢爛深沈文理橫陳宛丹符之疊篆緣飾繚繞訝翠羽之垂襟五雲書䘖將飛詔百衲錦挂向當心衆目詫視兮不敢迫近靈機自愛兮返顧沈吟怒目凝注紺髮森峙翠眉雙妍鳳翍獨異嶄然斯張竟為嫵媚初笋迸於犢角漸竹批於馬耳彎拳前屬精粲交麗故睨而視之曰吐綬以呈竒眩而惑之者謂非形而以氣豈識方寸之間不倫不類可大可小有張有弛邪於是斂彼輝煌屏若退藏盡忘所有舉止如常有隱君子見而歎曰是所謂明哲保身不顯其光也夫吾聞鹿以走險麝為生香已之所纍在有其長此禽雖稟文華不常宣露時然自娛卷舒有度其養晦也藏器其覽輝也遇主可不取則為吾出處知格物以書紳因援毫而成賦石菖蒲賦天台石橋佛仙所居境聯鴈峰厥生宜蒲劒挺分脊虎獰奮鬚維水清而石硬産徑質之伊殊較他山之蔓生蓋烈士而腐儒巖壑之阿風日不到地脈所潤淡泊自如又疑得道以逍遙不踐名疆而利塗山僧野夫鑒竒品異搜取來歸得亦匪易臨峻崖之十尋凜束身而下縋或續以長竿之裊或刺以纎鉤之利自非好尚之孤髙孰肯鍾情之及是乃漬以清泉藉之文石玉峰之矗蜂房將樂之珍雪色齊安子供艾若指螺曲陽盆盛浪翻瓊液壅沙屑金封苔澡碧於以滋生息於以安野逸搢紳先生綺紈公子膏梁厭飫輿馬赫奕乍而見之神爽心懌欲頓忘乎肉食於是移置雕欄擎擡文几纊犀筯以鑷塵雨犧樽而鍾水夕凄清露之下晝蔭花隂之底其所以愛護者彌至然未閲月而根麋甫浹旬而色瘁者何哉顧乃過尤懈怠於臧僕疑被侵陵於蟲蟻豈清虛富貴逈不同方鐘鼎山林未容兼美徒使唐嘉緑野之清風漢慕赤松之髙致彛齋處士從旁而嘻曰我知之矣請言所以余見隱徒其室方丈人迹罕至景密護其南榮苔欲生而滿地羅列峰巒奠陳罍洗翛踈數劒倚壁蒼翠水僅濡而不盈根頻殳而勿施每指一而問年動歷閏而逾紀靜定純一有終有始寒暖燥濕不遷不徙厥無竒方唯安汝止彼其愛之適以害之特未諳乎此理方梅霖驟至浸淫滂沛根聯絡於銀絲主人為之欣喜不知力既下分葉枯而萎紛九節之連延乍叢然而森起亦猶飽豢於肥甘夀劣休糧之士其所以約水護根經年養力葉老滄浪亦煉形之術耳又况勤怠殊方炎涼易位不常厥居朝三暮四何異爪皮驗生拔本觀密有愧槖駝之子此言雖邇中有深旨請書以資養生豈但曰蒲而已五言古詩二十三首上習庵陳先生厥聞忠孝者所出同一源子於所親孝移忠理必然親賢亦子訓忠節貴兩全殺身能成仁揚名斯永延是亦孝所在豈但知色難嘻其叔世風本末嗟倒懸若曰能養耳食美衣華鮮茍求胡弗至側媚諂笑肩彼其良自多喟歎逹者觀向來歐陽公拓落夷陵年夫人告之公淡泊吾所安慎毋為險變守節當彌堅卓哉名母訓紀厯伊誰傳恭惟奉常君矢心直似弦立朝幾抗論凜凛髙回天力蘇憒憒徒若障狂瀾川人知君守固當識君母賢想其勉勵時諄勤誨膝邊怡愈一領解心注靡變遷升而髙為天下而沉為淵但知慈訓在此外浮雲焉兹來從吏隱斫屋新數椽曲檻花葳㽔虛忩月嬋娟雅意寓一賦懦立貪以亷我誦順親記有淚如迸泉我貧母亦老苒苒髮已宣家徒空四壁簟笥笑且便惟虞官針曠勿以溫飽牽澤深百川赴火明斯聚蟬投君以臭味君子毋棄捐仲弟借書持要不謹護有損為之覆背葺還昔聞勤讀者三度絶韋編讀書書已破書則在肺肝摘實咀其華發揮事業間伊惟事精妍整束懸牙籖縹囊手未觸慨是龍泉言虎子畜溪魚汝懵未鑿顓胡䇿追元方紛紛探簡編抱書手不龜靣壁縳枯禪靴化例隨水竟負一瓻還季也怒生癭我慚家訓顔願季無䘖怒鳳樓修則完嗟嗟仁義諫束濕何由痊顛倒幸爾存柿葉風掀掀糊老飽九炊紙搗翼擬蟬翻翻事兼兩滑膩好且堅手鑒具在兹秋露無重妍舊書百回讀訓佩坡老仙請季事斯語慎勿髙閣懸因憐數匱藏徒疥小印存浮雲忽白衣世事無不然眼底不自快封閉何取焉所貴得之心亦可忘蹄筌又憐囿大塊華好竟飽鮮一飽羶聚蠅曷與千古傳纎雲飛四散皎月標中天贈筆工吳升蘭臺上狸毛山谷愛雞距物勝因人成雅製傳自古風流渡江初筆翰猶朴魯曽窺上方製遺範典刑具寸簮束萬頴贍足飽霜兔豐融沛行墨充實自妍富行間得茂密夫豈窘尺度澆浮自趨薄羸劣醜畢露清快誇鈎心節括號叉股纎纎銛甚錐秪便庸書伍殺鋒出光芒苖枯旱無雨齷齪癡凍蠅安能劂石怒爾來邈東嘉法則自誰祖宛見昔製作齊力萬毫努吾欲標諸人示兹明取與斫雕還反朴淳風招已去春苖異蘆筍廣袖謬織組誰能一羽力回彼滔滔注百爾今已然豈但於筆故題黃嵒夏氏曉山亭詩卷元暉工畫山最識山之趣每言籠朝雲乃是竒絶處君家結幽亭兩峯正當戶窣堵冠其巔雲中雙筆露宗老為扁名得自昌黎句相當卷書坐塤箎遞吟賦是時神宇泰白雲未飛去滃然截山腰素練初橫布須臾朝陽升景象幾更互盤旋宛逰龍披離擘輕絮春澌苒而泮青煙惟一縷霏微辨岡巒歷落分島嶼露晞如膏沐蒼翠盡還故松針與篁叢貫穿珠無數應接良不暇詩科亦既冨只憂紅塵生分我淡思慮更須清夜來四更看月吐詩談吾嗤彼云士努力事詩妍竟日搜枯腸抽黃對白間爾何無達觀局促自縳纒不見淵明陶有詩纍百篇要以寫吾心出語如流泉採菊見南山得句於悠然少陵動感慨忠義膽所宣有時心境夷亦復輕翩翩纎纎白雲間無心遊日邉風石激而竒奔迸生雲煙詎以天然態而事斧鑿鐫陶爾一觴酒警爾心地偏少焉明月上髙挂西山巔聽我曵杖歌金石聲撼天萬壽寺避暑讀書梵寺齋殿深屋古洞隂冷火雲自空飛此地暑盡屏乍至心已清坐久體如氷官清務乃簡居易事亦省是為臭味同玉碎金無礦蕭間日追隨論辨當修省展書相對讀佳處擊節猛輿皂謂前兹文會無許盛觴詠直寄耳沈湎夫豈肯過從奚厭密交道久彌敬無令數斯踈此語共知警為倉使吳荆溪先生夀人祝先生夀勳名而福祿伊惟小門生而乃異斯祝所祝在斯文其夀非已獨嘗聞侍席言櫽括因以復孔孟至皇朝文與道相屬溯自熙豐後專門始分目歐蘇以文雄周程理義熟從此判而二流𣲖各異躅偉哉水心葉同軌混列輻粲粲雲錦章理義仍炳燭筠窗一傳後人已沾膏馥正統的屬任非公紹者孰鯫生耳聞此驚詫歎不足因捧介夀巵譜在歌詩軸願言清節髙嵗寒等修竹長以文鳴道聲金而振玉上而軋漢周俯命騷以僕門生嚴楷法剩將從紀録漕使李寶文先生除宣城守幕客崇酒觴渠渠餞行舟先生蘸甲飲不使涓滴留持盞顧謂言汝復能吟不爾不歌吾行而俟吾言求沃爾滿鍾酒畀爾筆力遒扶輿懵懵醉夢化蝴蝶遊夜分起展燭落筆蓴絲柔請歌先生行真與人不侔前者亦云歸金帛囷載收今惟明月耳舴艋輕浮浮視彼掊斂徒推剝藂怨尤逮其去國日競欲瓦礫投此乃戀寬恩説著涕泗流國用既云裕民愈亦云瘳而令分左符逺從牧山州投鼠戒忌器矧我無是謀彈烏或驚鸞盍亦謹厥籌兹焉皆汩汩去矣從休休伊惟小門生莫計攀前輈彌溪桃花水舟行願悠悠行有賜還詔佇立螭坳頭拜范文正公祠瘦石插半天玲瓏聳蒼翠想從混沌初有此紛破碎斷截不分離欹危不顛墜乃於其中間穿沿石路細頻勞謝屐行捫撫足幻怪下有泉溶溶根來從石背香山才品題名得因人貴瘦笻行清秋西風吹我袂躋攀幸未疲俯仰一歎喟下山拜范祠遺像儼如在胸中萬甲兵曽使西夏畏巖瞻石不移可想鐡肝肺嘻其羣小人風林犬空吠於今孰存亡取捨良亦易但堅自力心嵗寒見節槩卓爾彼何人晞之則亦是詠史贈王侍御昔有陽城子髙卧中條山粵從丹詔聘職諫居朝端北垣七八年一詞曽靡殫於中常戚戚事以秦越看諍臣論一篇見誚昌黎韓城日洽壺觴視之無汗顔一朝天子誤鼎鼐庸雄姦皇皇朝野人敢議不敢言城曰兹可矣不言吾豈安當廷壞其麻勢若回狂瀾臣言不可奪臣肉所可剜孰謂雄猜主天聼亦為還一鳴必驚人朝陽之祥鸞一飛必衝天北溟之鵬摶啾啾燕雀輩終嵗寒簷間君今踵其武可想倚任專士習弊滋久未易一匕痊遺臭偃月姦殆今逾百年利欲錮人心深矣莫洗湔幾新更化機仍澀膠柱弦洗泥何能清救弊應其源昔無起樓地今舉田連阡而以求善治却行而欲前復有事誕衒奮臂張虛拳驅虎戕良民臧否已較然膠舟倚航海惻聳憂世肩夷甫在晉朝舉世無幾先卓哉辨姦論萬世一老泉瞽言再拜獻感憤涕泗漣昔者漢更生危言扶彼顛皎余明寸心不向流俗宣維君中流柱屹是障百川向來稍詭遇髙官懷袖間耿介甘不售嵗寒松柏堅國無君子哉緘默誰復言松江千頃浪涵月金蜿蜒於兹送君行商歌頻扣舷明當重回首晚風楊栁邉佇希御史雨迅掃靖幅員送放生池碑維書號心畫於以觀厥德堂堂太師顔忠義挺不屈怒張鐡柱立凜若罵蔡賊蠶頭而蠆尾屋漏而壁拆豈事筆端求要自心胸出心源儻匪正馬謾按圖索君侯氷玉清一點塵不入擺脫世緣盡四壁無良物源清流應隨心同寧異迹前年鎮霅城清風貪者格人言政化明如仕唐大厯人言八法具儼是浯溪刻卑棲小李掾松茂悅見柏甚欲事灑掃筆硯供洗滌官身類匏繫唯向清夢覿手拓魯池碑潢謄寄遠驛既異褁苞苴抑匪徒挂壁舉目見顔公英氣聳辟易又若小子勤祗莊常侍側别贈陳新叔弟神靈造天極仁深祚綿逺光堯渡江初屬族扶日輦南來逾百年瓜瓞載繁衍開江一枝燈海濱發長焰紹興庚辰第伯祖維創見自此燈燈續儒科已纍踐姪也幼則孤門戶中屯蹇執編青襟後浪䇿禮部選有叔行𣲖親隔驀此異閈天都邂逅初覿面苦恨晚為言起家難銖積勤靡倦相從忽問勞把臂互驚嘆霅城每頻過訪我李曹掾及兹脫選海幾擬謝深眷三年在奔波留滯顔色靦扁舟此經從相見笑而莞排日羅酒漿延顧禮既腆所欣廷蘭秀一一莫可揀讀書固有獲而况多積善竇桂未足誇王槐定應顯願言闡宏規涵肆觀文典士業止科名耕耨工亦淺胸中澆萬卷落筆自精悍何當它年來大雅見文憲功名固懸命立志母狹褊微言勿謂迂聊作友于勉乙未春初解漕幕兼職訪秋壑西湖探韻得柳字浮生恍流萍聚難别易久經年稀會靣感歎兩執手佳賔稍翕集歷落馬蹄驟競誇摛錦文雄騁翻河口主人金叵羅頗費黃封酒環坐松下亭海納翕敷受飲酣氣張王聯題健揮肘山凹日斜射簷額風穿逗恨無秉燭遊以夜繼斯晝聊追擘韻戲嶮窄互呈鬬分擕上木蘭漾槳幾回首遙追飛蓋歸數遍蘇堤柳必大弟赴新城簿乃翁换官班幾鬱青雲志晚以身徇國而得祿及嗣妙年當膴仕應識珍重此簿領職任輕正合親文史東安吾舊遊山水清且美編戶雖不稠而亦有文士擇友如擇木所貴髙於已遊觀固有時要在不踰禮飲爵不過三馬向坦塗履幕府儻留連謹抑如處子切勿事軒昻攻者蜂蝟起我已慣嘗此説病乃真意第守謙謙心由天工處置命透如春回不壓重石底爾祖積善在造物報必侈以我苦澀詞普告兄與弟莫怪欠誇諛食橄有回味謂余言不信識者試質以辛丑孟夏甲申日得雨物理寓乘除天存好還道去年夏迄秋旱枯苖盡稿繁霜打麥根療飢兹已兆逾春秀葽葽修翠搖旌葆黃雲割未盡赤日仍杲杲秧針方刺牙還憂水泉少正深傷弓虞曲成由大造耕雨刈欲晴從來難兩好來牟逮既登甘霖乃方到甲申占久雨古語信可考首夏際兹辰其應孚未禱繁聲喧若注隂雲陳如掃入夜聽簷溜滴瀝響到曉蝗螟腐翅翼蛙黽喊池沼從兹雨未艾調潤知可保一畝數石收麥秋功已告千倉而萬箱應占冨禾稻匪藉天功然人力寧爾巧端由政致和天示賢侯報不死見豐年鼓腹歸醉飽末掾與農氓熙熙歌皥皥夜飲歸戲作夜雪合三更崑崙兵密渡常時喜慨談此夕若親覩杯行數已長談辨氣掀舉微酣上籃輿迢迢向歸路出門林盡白飛雪正零舞苦寒嗟僕夫鱉跛良窘步北風惡打頭滅燭失四顧平生功名心每作艱危慮小試應危機郤輿自行去腳力幸未衰乘之酒力怒踏雪如踏雲了不見辛苦尚奚畏泥塗寧恤雙靴汙僕失莫余追瞥若肘生羽鶱騰甫登橋健翎已逾兔還歸坐中堂長嘯默不語絲鬢且勿生未謂余不武夜雪向桑乾立勳期晚暮凜凜金石心捐軀事明主九三月丹昔人登辨山得此花園工有九三者忘其姓為接度種今遍苕霅號曰九三月丹有花血嫣紅侈娭大於碗五出猩袍裂萬攢金釘滿數日色彌鮮不畏風日暖山茶越丹輩馬塍豐土産殊名幾百種並立色俱赧客言名之由其説鄰怪誕昔有樵辨山絶頂路迷返見此物尤異斫置歸里閈九三槖駝流厥藝工養豢惟以第行稱姓名微考按香泥密封籜接度根暗换若古姚魏然因從九三喚從兹入西浙移根遍名苑家家尚此花買價不論貫青油障曉日朱檻護雕瓉微物因人成感此一喟嘆憶昔洛陽花夀安紅為冠要其所從出亦自薪槱伴伊維花卉流第以色媚眼青青三寸松養可凌霄漢明堂須衆木未易一材辦工師無遐遺材滿巖崖畔題吳門顔氏敬享亭石記贈一齋蜾裸祝類我慈烏知反哺伊人矧最靈而不以斯故養雛數羽毛初志亦辛苦懷哉肯堂念寥寥幾千古君其若而人悽愴踐霜露欽聞先君子清白守儒素何以遺後人多文以為富潭潭詩書府魚魚禮法度王槐信厚成竇桂隂德著雪玉塵不緇鍾美見垂裕勤修不自閟刻詞流肺腑應無忝厥紹錫類及噲伍卑飛未仰報有淚滂如雨山髙不礙天水流必東注願言堅此心宜詣聖賢處他石或可攻庸效南陔賦題陳山龍祠白龍生陽山龍生龍母死於何藏斯陳其説從古始豈伊𡨕邈中而亦有地利季春旬八日嵗嵗雨𡨕晦龍下大如柱萬目儼駭視謂龍來朝母人胡不知禮邑人嚴奉供神宫聯梵寺龍君與龍母居中堂殿位兩廡香火誰分祀及四子山腰有龍湫泓澄一掬水水旱不涸溢甘冽冷牙齒禱雨乞一滴闔境得沾濟昔年令君來瀝酒方奠啓有物蜿蜒見舉體金色被巡沿上巾幞馴狎了無畏令君端笏迎迎入香奩裏誕四子如粟久矣傳神異逮置湫石邉倐與電俱逝或示夢畫工畫龍要珠戲或載見蜿蜒躍戲花壺際神靈及事怪龔碑詳紀記迎享送三辭上軋騷章麗荔子丹焦黃羅池未專美余來擊節誦金石歌聲曵邇年又喧傳其説更譎詭後殿方落成將以奉大士一夕大風雨巨石暗飛墜髙髙山頂來直頓殿堂內端然一寶座不偏亦不倚既無繩墨量誰與安位置不知幾鬼推毋乃隂兵徙是為鬼龍力其説信有以又云虎新過泥沙印遺趾爬㧓大木皮畫畫有文理海山斷不連四望惟茅葦又無穴宅居此物從何至有龍必有虎神驅理或爾不然虎尊龍墓前來伏跪想當清夜月踡局安其尾談玄與訊怪更僕良未已笑呼金叵羅一把詩腸洗數酌帶微酣長嘯奮雙袂徑直上山巔惟如履平地海神會我心卷浪雪花沸中年腳尚健有志聊自喜下山猛捉筆揮掃不停臂素壁兩三間掀舞龍蛇勢重賦暨邑池亭新沐試絺綌涼生神骨清髮踈逗風爽半幅紗巾輕逍遙池上亭緑隂取次行清和又重見時序無留停叢委簿書間那得散漫情乍此偷隙間雲開月暫明故園松菊荒蛛網罩南榮琴書知好在奧窅誰為評憲使陳習菴先生除司業連宵對涼月間吟祖行篇攬挹南卉香入句期清妍追隨剪吳江送君翔九天豈為兒女情戀戀祈恩憐兹惟時多虞活國資清賢近者小司業繇之入諫垣古劒詞古劒三尺長土花上鱗甲幾年閉蟄藏射斗光夜發提攜繞區市鮮復事磨刮嫖姚一拂拭蛟斷犀可截志士寧終窮行逢逹觀逹曲澗山頭分兩崖知有泉來處曲澗潄琮琤夜來應驟雨葉嫩明琉璃藤生絡松樹石腳漲所痕莓苔濕無路玩之室生白明是春將暮何當門對開小結幽廬住七言古詩十五首江灣僧舍水石芭蕉老耳最怕風雨聲芭蕉葉上聲偏鳴新枝日展翦不替况見蕺蕺成添丁呼童具鍤斫寒玉蔓圖貴早除其萌醜疑烏啄側著附又訝蹲鴟不可羮一笑翻成有料理古盆石供泉清泠黃梅彌旬雨霡霂苔封沙擁生意成小試抽書嚏撚細鼠牙入水銀鬚生漸離土性安臞瘠淡與水石相忘形巡除日課長養事莖添葉比紛欹傾炎威不到琉璃碧水脈透尖珠貫縈蕚緑華仙斷火食雲裾曵翠身輕盈風軒暑簟足蕭爽晴曦更有冬忩明丁寧閇塞謹愛護秋霜夜氣防慿凌一年一年春風好根株宛在蔥蘢青崇桃遮莫金壺貯日暮隨風紅雨零登普滿塔海濵荒涼斗絶地古寺窣堵標蒼旻三靣黃茅連巨浸突立嵯峨超不羣可憐前此無管領欄干罩網蛛絲塵相攜暇日足登覽晝長正度南風薰氷盤朱李冷尉齒雪絲細葛輕襯身飲酣神王氣浩浩半空笑語驚行人墨圓新磨紺於漆大字題成泣鬼神交酬錯勸互賔主雅論諧談肺腑真觚稜挂月筵初散歸從傳呼紛若雲英遊便可誇盛事緇流勿訝吾來頻甲辰嵗朝把筆四十五畨見除夕稍知慚愧此之日小時辛苦習科場惟恐一官身未得二十七嵗方塵忝又閲八年初實厯又閲十年滿兩任汲汲皇皇望通籍况逾百指家纍重蔭贍浩穰憂不給所以中心懷蹐局每至嵗朝常戚戚前年涉險趨淮幕去年舉剡甫及格猶自奔波趂班見來往時時在塗陌今年事定已改官分邑不逺近鄉國秋風行可報瓜熟便得怡愈奉慈色所以親邊知自幸笑語團欒竟通夕雖然丈夫致君澤民事業匪僅此要是此去無限隔但辦勞心供撫字忠信尚可行蠻貊斷不依阿事嫵媚亦不聚斂求封殖升而戾天沈而淵一聽天公無固必若綴班行儘向髙爐香夾侍螭坳側剩擬抗論髙回天粗有外氏之遺䇿或分一壘向邊疆願作長城如李績霜臺直筆屏姦回機幕飛毫草文檄更令小試經綸手黼黻曽夢江淹筆不然種花蒔藥老海濱却覔長年當官職食雪君不見蘇子卿十有九年留朔廷牧羝未乳歸未得吞氈莫救飢腸鳴又不見陶學士家居三冬足文史玉堂退直清興生謾把烹茶誇婢子我生徒飽太倉粟慨懷伊人常縮恧我才又無揮翰手食此豈不顔增厚浪遊枉自在江湖幾年見雪一語無只同兒童跳梁喜欲吟自覺腸乾枯朔風打頭夜來泊擁篷曉見銀糢糊銀盤收拾和蔗漿銀匙攪碎紅珊瑚一抄入口清風生再抄乍覺心眼明連抄疾啜盤已竟肌膚起粟神魂輕食罷拱手謝蒼天小儒不學食露盤無補多欲妄求仙願言片片皆詩料吐吞造化歸毫端亦不吟河橋送别凄涼句亦不吟依本胡蘆取天怒但願氷稜雪塊在心胸飄飄解做梅花賦斬偶行安吉州小民之頑凶者土偶刑餘之囚祝之以起凶傷守倅斬而絶其姦君不見昌黎諫佛骨竟莫遂請水火投中丞擊妖蛇此蛇初不為民尤寧如立斬興妖偶卓哉偉見吾邦侯吁嗟三輔州尚鬼逾蠻酋此輩生身已麗法尚何智慧靈諸幽惟伊姦凶愚爾俗假慿威毒相仇讐依乘土木作幻怪竊取血味神其謀除凶破偽􅒂一劒較功韓孔兹為優嗟嗟願公寶此劒更煩借截姦臣頭送朱支倉試刑法科士業讀書讀律恥亦不屑至其有以男兒奮身自力耳有足成功奚擇地誦德科條似流水筆端端可判生死用之自貴勿輕視贈君飽霜毫錐子萬毫齊力鋒頴鋭庭隂未側可萬字十問俱通䇿勳易即次風雷星斗位還取儒科濟世美更贈一言君我記終身行之恕而已厖蚓圖一蚓蜿蜒行燥土定是明朝天作雨六厖酣憨初耽乳乍見異物吠驚覩老厖垂涎傍睨顧此心亦以舐犢故鶉衣百結多兒女錦屏鴛帳輒獨處送馬上嬌圖與秋壑監丞繡韉金狨玉蹀躞天寶繁奢逾大業華清浴已宴沈香弓箭才人擁旌節前頭樂部紫雲回催駕顒迎奏三疊阿瞞駐轡立多時欲上花驄尚嬌色俯頭縋鐙力士徒曽以脫靴為屑屑步步相隨那肯離嘗聞願作連理枝燕安儻及思艱危那有馬嵬攀訣時漢家山河安四維披香千秋惟弋綈龍眠畫兹非衒竒端與曹髙向孟陳元龜秋壑納室慶席諸友分韻蘆葦戰風聲颯索細雨吹絲氷簾箔暖盤醉客珠履喧聳鸞筆飛璣唾落詩人大義在切磋曳裾彈鋏籍若何正倫風化理不二御邦即是家之和採桑曲桑椹紫來蠶務急帶曉採桑桑葉濕屋頭緑暗勃姑啼柱礎朝朝汗流出人家蠶老婦勤苦銀釧忙催隔忩霧方花古磚衮香絮院靜簾垂明燕語沉炷銷來煙半縷賣鏡賣明鏡怕明鏡從來面瘦兩髙顴况復星星添鬢影世間萬事只宜晦明鏡何須炯相對鏡明賣却昏不磨從教雙鬢雪婆娑青春能幾何青春能幾何青春能幾何蒼髯紺髮看成皤亦有紅顔嫩於花東風馳道屬誰家可道光隂流電轉草上霜飛峭如翦心如不知恍重見心語不通惟見面重見面愁轉多歸來銀燭炯長夜歎息青春能幾何青春能幾何青春能幾何日烏月兔去如梭膠粘難安枝上花頗惜相逢殊草草中心有言不復道鵲喜傳訛易顛倒想得也應生懊惱謾自有千金無方駐臉霞休言洛陽看花伴經年浪蕩不歸家君不見青春能幾何二禽言戲贈難弟歸歸歸西浙暮春有禽鳴連三聲皆呌歸歸歸歸三月將盡方始啼木林翠密隂成幄花片紅嫣風蕩飛歸歸歸汝既勸歸胡不歸歸來深院日正長煮酒菖蒲玉屑香醉眠藤牀覺晚涼須臾月色到回廊歸歸歸真箇歸來樂未央篤篤篤此啄木兒也因其聲以謂之篤篤篤日長正午睡初熟誰其扣門訪幽獨見他利喙啄枯木枯木中間能有幾小蟲何足飽爾腹盡日勞苦食不足篤篤篤此聲尚且聒人耳人之多言寧不瀆戒之哉篤篤篤
