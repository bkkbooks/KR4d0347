body:
  text: 彞齋文編巻四宋趙孟堅撰啟上劉貳卿啓一官未調魚竊類於上竿千金不違鴞因求於見彈輙陳儷語庸冀踐言九頓首以陳情載歸心於大造竊念孟堅生雖屬籍勤愈韋衣少偘偘以自將長落落而難合秪應晦藏於林野決知難逐於市朝重以烏鳥飼哺之情奪其猿鶴逍遥之性低佪科舉之習幾刓方而爲圓指擬仕進之榮類說河而止渴一塵末第五見新春中纏風木之悲銳心頓减上爲堂萱之命彊顔載前嗟四選之摩肩無一枝之著足比值海昌之曉闕實於巴里以隣疆風傳𤓰熟之期指在梅黄之月抱闗為吏方欣日近於長安攘臂有人幾是雷轟於薦福屬當注擬俄致轉移取蝥弧以先登非其有也歴阼階而上訴豈好辯哉然昌黎雖比於叫號而景仁不失其和氣言雖近激心亦無他方噬臍於觸籓之餘將沐蘭於烹鮮之地敢意寛容之納藪寄聲俯示於調停以羊易牛又何較焉舎魚取熊皆所欲也自禀諭言之逮幾希成命之班及干赤縣之征商果沐南山之判筆乃知惻怛亦念孤寒然而側聽逾旬尚遅該注未信功虧一簣之進必也丹成九轉之餘寸綆雖微輙不辭於測海躍金罔棄願終遂於鑄淵兹蓋恭遇某官訓學師儒文章宗老從槖著論思之績典銓推流品之清兼溲渤以籠收備杗桷於匠宰至於摦窳亦望陶鎔矧惟肖翹之微夙荷生育之厚春官較士曾推透浪之鱗天部掄才應念遶枝之鵲興憐聳動特逹判行擲燕沼之蛙言式堅於金石空冀北之馬羣亦取於駑駘改官謝總使賈秋壑先生啓蚤嵗遊昌黎之門在諸生而最久髙年被山公之啓於五削而尤恩及兹僥倖以隨班用侈揄揚而頌徳伏念孟堅生地孤陋面壁苦㕘文非華飾以求妍達辭而已仕不波趨而取媚顧理何如自諉凉凉分甘落落秪圖便養猥任讞曹方固守於風波之中不計毁譽被明揚於薦舉之數漸及周圓逢知己於冶泉可覃潤於隣路冒昧啟請迢遥致辭借秋風於驛使之梅初疑好夢易冰銜於餉臺之檢幸屬兼權堅操不改於嵗寒公是不摇於浮議摩頂放踵皆被徳髙天厚地喻深恩曩秪受以惟慚今計量而益感遥申儷牘跼代拜堦兹蓋恭遇某官特見不凡盛心近古尚㢘隅之操狂獧兼收開功名之門辛勤是取木牛流馬已飽貔貅之士冰天桂海行清風雨之區作成委蔽以爽邦抉剔幽㣲而薦士以若掄材之氣象可占宰世之䂓模凖是融眀懋鬯摩礪求斗筲於釡粟正慙匏繋之拘洗兵甲以天河終從豹變而徃初任通憲使趙四忩啓駕駟車而問俗肅欽部使者之威登龍斷以司征行厠賤丈夫之役奉教條而謹始慿儷語以通誠恭惟某官天資逾人家學髙世筆下三千字早騰虎榜之英聲胷中萬甲兵兼擅龍韜之秘畧精忠昭貫於日月重望雄鎮於江山軍民孚徳以傾心邊鄙聞風而破膽自著金閨之籍累參油幕之謀膺劇任而弗煩見大敵而不畏頃屬遐方之梗化長驅兵馬以逾疆磐石維藩允藉一方之巨鎮金城作固隱為萬里之安强親冒雪霜之嚴力障風寒之險督貔虎以俱進除荆棘而不㽞山城重歸版籍之全淮甸已息烽烟之舉卓爾斯偉謙然不居髙牙雄節而方寄以保釐粉省含香而旋司於繕監意接武巖廊之上乃觀風繡斧而来治本和平一體聖朝之寛大政行安静盡捐苛法之滋張措八州於陽和長育之中肅羣勢於震雷疾撃之下吏皆慄悚民靡枉寃囹圄空虛已著三年之報效陶鈞坱圠佇聆即日之登庸孟堅禀志迂踈賦材疲軟刓方為圓於科舉之累望洋啟畏於筦庫之司回思初志之自期殊歉壯行之有立念平日粗嘉於節義每向風願附於勲名無力弓刀縱不能效終軍之請有心筆硯豈無以感武夫之心至如夭矯懸露布之書與夫鐫磨勒天齊之石皆慨懐之梗槩兾遇主於宗師指日見中興之宏圖有時備大厦之末用昨擬歴堦而拜叙誰憐未靣以前陳因通鄙名附述至悃松茂柏恱儻念自同根而生狗盜雞鳴終或有綿力之効謝京尹顔大卿先生檄入僉㕔啓伏凖使帖委孟堅入本府及安撫司僉㕔者水歸滄海夙傾東注之誠材遇工師終䝉下體之采感思知本誓已輸勞伏念孟堅守拙成愚將事過質盡信書而乏通變不量今古之殊時好直道而尚激昻奈何人已之異趣曩於幕府粗竭悃誠事屬權豪同列趦趄而閣筆謀深詭秘羣胥變幻以舞文居常奮筆而直書未始掣肘而顧慮拂情者既衆紛毁譽之交騰公論者具存難是非之終冺分安踈賤屏若退藏仰䝉逺照之旁加時分隆委以誤及决濫囚之禁戴星而行拒侵疆之爭折箠而定縱未得游揚於左右獲載供奔走於使令敢意肖翹仍歸器使食蔗漸逢於佳境泛蓮欣從於英遊況借衮褒以光羅致用於知已蓋赴湯蹈火以不辭恪守初心於易節變行乎何敢苐以浩穰之天府藂然紛㳫之民詞欲少贊於神眀又安用此椎魯某官江河容量日月回光顯善表賢過張侯之淵鑒發奸摘伏邁廣漢之如神塵淨天街波澄浙汭惟胷中既有活法故眼底不見全牛指揮皆識時之才能芝蘭多有用之器局自慙么𤨏曷稱委驅孟堅敢不誓竭丹愚益安素守外盡磨於圭角期終合於凖程庶幾中庸斯無上負汗顔血指服勞姑狥於此時醴蘗羮梅佐用尚期於異日又舉闗陞傍謝京尹袁大卿先生啟百川宗海惟知洪造之依歸十駕鞭駑偶玷皇華之薦引蓋吉曜臨則禨祥著秋雨至則溝澮盈非竊餘榮曷有幸㑹奚必出於親舉然後謂以為恩伏念孟堅良知近迂安分守拙詞非衒恠祗以自嬉行非好髙苐求不茍弗以遊倅塗寛而懈怠敢云征商司賤而曠鰥粗心章句之閒或趣功名之表每念賀白之數子是亦景元之諸孫論靈𣲖則均曰璿源較同根則俱分若木彼其萬丈之光燄起欽倔强之昌黎而方七嵗之篇章嘉動嘆嗟於皇甫遺編俱在餘響孰傳固殊夾輔之勲庸亦可自見於言語豈伊遐武希我清朝邇年頗膾炙紫芝之春山雲晚學抑雋永仲白之荷花水若律以三百篇之忠厚較之數十韻之新竒遡流應合尋源玩華猶當摭實山無烟霞則不韻水因風石而後竒竟所以然抑又難語可應駑魯欲逐騰驤人方競笑於迂愚自亦衰靡於日力敢慿言餌冒作身媒忽逢當路之達觀畧以勤心而過賞呼之寂寞俾奉周旋薦自孤寒少從激勵靖言幸㑹敢昧原由風引帆而舟移天彤雲而雪應常日矧加於覆護前参復借以誇榮恩地有歸誓天無報兹蓋恭遇某官權衡鑒爽鼎石量宏鍾鄞山秀偉之姿竦巖千仭傳㓗齋清白之緒喬木百年心休休而容人日孜孜以為善况東學親沾於教雨故此時獲被以餘光迄是遭逢果兹成就驗樓臺之近水快鵰鶚之横秋孟堅敢不㓗已自㢘糜身酬遇願效冶金之躍更希鞭影之加委䞇師門敢效籍湜之軰究工筆事或忝游夏之科又投京尹裘晉齋先生啟伏以蹔縻鄰幕未供駕力於師門嘗辱衮褒輙兾鶚書於薦格捫心知愧啓齒斯慙但斯時之遭逢係一生之榮悴躊蹰三復孟浪一鳴伏念孟堅賦分雖卑抗懐甚介鄙場屋之聲病恠恠竒竒懲世俗之脂韋涼涼踽踽髪衝冠而觀黨籍恍前身元祐之忠魂指畫腹而按輿圖每痛心紹興之失筞弱力自甘於運甓疾聲時發於吟毫雖或被於揶揄亦間逢於賞可卑棲下邑謾仕征司不因捧檄以趨臺寜得摳衣而侍席幸親範則况望身榮獨憐薄宦之升沈皆視公車之軒輊矧於職剡尤重薦員鼎足貴全簣土戒止既黄華之首倡必洪造之終成頃於秋頴之既堅俾伺春風之俯及念賢才森立固難强軋以求伸而與受難公未有不求而可得泯然緘黙則幾于自畫假之從諛則近於要尊謀心何止於再三捕影庶幾於萬一載陳􅝴悃仰兾淵裁兹蓋恭遇某官大巧作人無私用世蹔總浩穰于天府旋司坱圠於鈞台鼔鬯羣材建立大業可否一定儼山岳之莫移决擇素精判涇渭以不雜自憐樸樕曾入品題苐未陪左右之游揚又寜無彼此之畦畛然百糓咸仰於甘雨萬象均轉於洪鈞願言兼收靡有遐棄孟堅敢不續長襪線用補衮衣凡是生平皆為報日咄書蠅凍莫殫跼地之忱聳翰鸞飛立冀箋天之筆投泉使賈秋壑先生啟詩壇拜師匠嘗摳衣弟子之行薦路楊人材幸託身屬吏之列雖未應援私恩而干公舉然久䝉垂定鑒以照勤心不道舊眷於門牆敢兾新榮於桃李伏念孟堅雖號屬籍頗艱奮身居處地偏渺黄茒之彌望丱年家否窘垂磬之屢空既無師友以切磋又蔑簡編之閱復食薺不云腸苦負薪每自行吟拈柿葉以堪書真行楷隷緝韋編而洛誦佔畢雕蟲一從東學之虀鹽附麗南宫之桃浪程文幸脫免覓軰於原夫吟事素耽轉攻心于欸乃凡螭首龜趺之蹟暨商盤周鼎之文􅈤􅈤垂情不覺疾雷之破柱孜孜得趣甚于披沙之見金非求好尚之竒少見造次於是偶動當路俯憐寸忱呼之初筮闗譏之中儕於上分幕寮之數為知已用肯為濟水之同聲刾俗眼觀惟荷公衡之旁燭兹為偏親而急祿來尸末掾於猥曹灑涕對楚囚得情勿喜借堦白部使執法不回竟出數人將戮之誣又動諸臺見知之恱仍㕘畫諾連被薦揚鶚書雖及二三蟻援初無毫秒孤立寡眇惟靠㢘勤逺地獨寒誰從成就忽報除書於英節頗聞好語於鵲音得平生知心以為依驗五十榮身之漸應雖十一路之屬部固衆莫匪干榮然千萬人之覿靣者稀獨嘗親炙庸希掞藻為合浮圖兹蓋恭遇某官報國赤心好事青眼有姬公握髮待士之羙同蹇叔好技若已之休珠履喧喧廣羅網功名之士丹心惓惓在汲引孤寒之人定成規於冶泉即秉鈞而宰世孟堅歸心匠石投已師模遥想隆知應無遐棄嵗寒知松柏儻餘恩顧於十年春風不世情想被扶摇於萬里謝李計使寳文先生檄入幕啟譏闗曠職方慙下考之書入幕充員旋被上臺之檄慨感刮目之遇奚敢俟駕而行踡跼公庭輪囷謝悃竊以士每難於自見况埋光彩於外寮世罕遇於賞音矧無介紹而辱命目睫之前尚莫知爾尺度之外誰其取斯好士如蘓長公暨識澤民而已晚有才若温處士猶假石生而為媒未聞於一見之間初不借片言之助鑒憐勤䘏羅致幽遐於昭公道之宏開庸占寒畯之畢達則為欣詫豈但感私伏念孟堅志廣計踈心勞效邈身雖屬籍素嫌華靡之為業謾科名本乏雕蟲之巧苦硬為文而見者掩鼻迂愚持論而聞多反唇分甘世味之鹹酸心印前修之鯁介究元紹之更復每攬涕而觀黨碑慕貞和之詞章嘗渉筆而儗魚雅衆方嗤其誕闊此獨信其斐狂幸考官不以瑕疵而春闈偶從菅蒯蠅營釡養茍禄市征處幽篁而不見天圍亂山而常少日𣙜輸粗了儘長日月以耽書道有不同或嫌涇渭之異派苐人虎而我䑕任方枘而圓規信自頡頏奚敢較計比以鎻㕔而試藝偶前奉贄而趍隅拱拜楷模獲呈技俩蜉蝣撼大木竟笑不量工師無棄材有來翕受爰加奬㧞俾奉周旋欻拜檄題恍疑夢事載仰崇臺之邃兼輸全浙之饒事大而體宏目藂而務夥有翰動如飛之敏然後可以效區畫無鞭算不窮之智則將奚以供剖裁雖貪器使之榮抑懐綆短之慮允謂拳曲而臃腫被之黼黻以丹青凛若兢虞悸不自定恭惟某官昭鑒燭逺大冶工覃身作世程心傳道統蘭臺執法明公論之權衡蓬觀掌書夀斯文之命脉具徯鈞陶之化蹔迂飛挽之勞將令舉世之樂懐生故不一介之遺寒士雨露牛山之木胚胎鼎席之基坐俾肖翹預歸坱圠孟堅敢不收除目瞇振迅衣塵念平生粗力於脩治期此際慨為之奔走磨鈆待割筞蹇服勤赴火蹈湯勇酬知已之用溉根食實敢作望梅之思謝節齋先生檄入發運本府兩幕啟用為知己籍湜終戀於韓門録及菲材温石果歸於烏幕願奔走者甚久被寵使以方新榮遇漸孚謝忱正力伏念孟堅勤脩力勉劇任心甘謂草木無知故爾春榮而秋腐而馬牛力走尚効東犇而西馳初非越爼以好髙抑欲報酬於遇主念福星臨照幸值諸臺之多賢皆平日師資信是三生之一遇與其自局於州掾何如少贊於臺綱廣扇仁風覃恢厚澤此寸心之素願果器使之親逢入贊讞評已知從臾矧迂公檄畀簉兩司飛粟轉輸既無鞭算之敏泛幕畫喏又微舌辯之能秪貪光寵於龍門不憚回旋於蟻磨兹蓋恭遇某官宗工巨擘良吏名師以肺腑之親同休家國鎮股肱之郡兼運餉輸焦心為國以為民斡利足兵而足食謂大厦匪惟一木而滄海寜厭涓流廣收小大之才共急理禦之計故令綿薄亦與使令孟堅敢不為岳添埃筞蹇追驥不計成功之有所但虞効力之無由茍可捐軀尚何擇地辭難就易實素志之羞為登眀選公行聿觀於盛舉初任書考回謝縣學友人啟謬司龍斷自慙下下考之書飛翰螭拏益感休休心之義與非所稱愧益滋多孟堅偘偘迂愚栩栩戇拙直弦難隨於鈎曲方枘寜合於䂓圓血指汗顔既於公事以懵懂反唇誹腹自招舞手之揶􅀈正爾包羞奚當衮譽祗貪言語之好兼慕隷楷之工藏襲篚箱永有模楷然相䂓以義者古道若以諛取恱者世情其於過襃敢例摟取古石著蒼苔之字皆是詭詞嘗稻流翻雪之匙但供衆飽謝大監尹梅津先生舉陞陟啟孟堅伏準照帖舉孟堅文章精神政聲燀赫充陞陟任使者率陳斐藁為敬宗工慨上剡牋實出過望信髙鑒自有定見豈今時謂無古風興言感嗟非止私謝伏念孟堅兒時孤苦居處荒凉稽制作於陳編初無師授究理義之深㫖不逐波流苐以寫心何求媚眼匪但於文而云爾至於行已以猶然加清眀於單詞毎申欝抑納忠赤於當路粗謂公勤柰投合之甚難有醎酸之異味所幸當路之有口能於局外以明心翕從轉揚併入賞與歘飛掞藻兼取迂材載詳襃許之言倍鼔激昂之志精神所在氣不屈則詞伸顯晦何拘名必求於實稱因誇知勉拜訓若驚兹蓋恭遇某官星宿羅胷中雲烟生筆底卓爾師帥淵乎範模在舉子中已頌有物混成之賦為文盟主稍憐壓轡玲瓏之辭不惟較藝以取長蓋欲觀文而成化即兹風厲之意嚮可占鈞宰之規模孟堅喜得歸依益加振筞知功名文章為差久不怠操脩於進退遇合之雖殊豈遽遷變誓於向去共建不磨願言昌運之興隆常欣善類之彚進輿地恢漢疆之舊願從着鞭大字勒浯溪之銘慨先泚筆賀蕭山趙宰菊坡宗叔啟昔同寮幕多藉成身今並南邦懸知䝉潤聆交龜之有日愧贄雁之後時恭惟某官膏粱盡蠲理義是恱嵗寒髙節交彌久而如初長風孤鶱獨親仁於泛愛一自辟書之上翕觀薦墨之騰繇縁地貴而才髙但覺天低而風便以若騰踔徑應邃清奚例從撫字而來特肯試錯盤之所過都歴塊君其自此升乎血指汗顔我則愧兹多矣孟堅真成失脚何許噬臍問版籍則虛無顧雁鶩則渙散每煎熬於自解况頻併於年荒脫去未能焉依是賴落筆驚風雨猶思陪侍於僉曹摘奸若神眀倚聽歡騰於衆口剩有評談之樂繼須郵遞之傳謝發運尚書史雲麓先生合尖剡啟孟堅伏準使帖舉孟堅好學而文律已有度使之撫字必著聲猷充改官親民任使者霅城司臬曾何品題淮幕為寮迄䝉吹送允重千金之諾宛攢五削之花成已恩深拜堦謝力伏念孟堅奮身獨學克志甘勤胄舉途寛不敢自易官游波靡未肻隨流力薅抽黄對白之浮辭慨尚激濁揚清之勁節參幕畫則抑豪右議獄讞則雪寃誣雖多鬼手之揶揄自有知音之賞激親民四剡當路具推平反惟勞法吏故抑自悵孤寒之應爾誰能俯仰以求諸冒焉又為淮庾之賔竊喜仍在福星之曜因頌曽䝉於許可或從終惠於眀揚人笑斐狂自諉孟浪敢意金丹得䑛遂令雞犬以皆僊終然大匠不遺乃俾菅蒯以並取煥騰衮字慨合頴尖為加靣授之榮抑表心知之篤衆賔駭愕以動色孤生頓覺於光增兹蓋恭遇某官天地偉量以兼容日月融眀而畢照家傳相業知洪化之無垠心好儒生每斯文之尚適務飛蒭而餉饋不忘㧞類以摉才藩方若是賢勞台鼎可占著績坐令樗櫟亦預凖繩苐味襃詞若幾過譽學雖苦卓方慙華飾之無文已固知脩正資矩矱以作則孟堅敢不佩言遵訓景行從風行施撫字之間弗變㢘勤之守有民與社從知職守之非輕報德酬恩賴保清名而不湼賀漕使趙虛齋新除啟恭審拜恩宸陛總漕京畿丞轄宣勞久著彌綸之績寳儲寓直聿崇飛輓之權君子理財庻邦叢慶恭惟某官氣宇陽春而又韻風姿玉潔而更清鴻寳秘篇究東壁圖書之奥錦囊佳句織天孫雲漢之章偘然華靡之不為㫖哉理義之是豢蚤攀髙桂宜照青藜乃徧歴于民庸而上通于閨籍潘花滿縣棣萼分樓篁屏乘馹以申籌赤子弄兵而浸弭兩邦慈母咸依豈弟之仁一路㢘風舉激澄清之化仰寛平之無濫宜藂委之兼資屬時國計之煩興借重邦財之妙斡彫敝已重須假福星之照臨調度方滋所藉飛芻之贍給然剥床則有及膚之慮而漏巵又深洩尾之虞非無趣辦之才恐傷忠厚之體徧籌内外允藉温良俾十五州無期㑹急廹之憂此億萬年昌宗社延洪之脉慶闗國計歡動輿情邦畿號使指之雄蹔煩澄察宅揆秉國鈞之重行職陶甄孟堅好修有心翔寥無力虞庠弦誦恍乗桃浪之三推闗市譏征嘗厠蓮幕之一數即之也温備四時之和氣撓之不濁凛萬壑之層冰治所至以有聲才無施而不可一麾出守甫著外庸四牡載馳徑司平糴鹽莢羡流通之利民生無饑饉之憂遵海而南舉䝉實恵自天而下倐畀殊恩俾専飛芻輓粟之權庸副卧轍攀轅之願咨諏謀度重觀繡節之新獻納論思佇復青氊之舊某側聆成命倍激歡悰千里而遥愧莫展鳬趨之敬二天獨有幸復依鴻覆之私瞻詠殊深剡裁莫既又代謝淛漕薦啟績文種學僅知蟲篆之工校藝程能猥玷鶚書之薦得踰望外愧情溢涯竊惟諸道之貢闈莫重二淛之漕舉預選者踰五十雖云取士之優旅進者凡數千總是出羣之彦矧今嵗大寛于舊法而四方咸激于壯懐負篋擔簦于于然而來矣發矢中的戛戛乎其難哉茍非擅聲律之長何以預甄陶之下如某者碌碌餘子空空鄙夫問一得三蚤佩鯉庭之訓駢四儷六每虞鼠技之窮命與時違勞而功少慨折翅于里選欲振翼于計䑓强壘滿前方切倒戈之慮孤軍冒進浪收奏凱之勲揣分奚堪歸恩有自兹蓋恭遇某官英姿山立雅量淵澄世莫與京挺挺紹祖風之舊年不可及皇皇秉使節之華貴名曽冠于羣英䞉馥旁沾于後學分題革弊待士致恭欲舉一人焉拔其尤雖占小善者率以録遂令骩骳亦預選掄某敢不益務磨礲載加鞭筞摶扶摇之九萬願陪鵬翼之飛掃禮樂之三千冀奉龍墀之對士伸知已書不盡言賀嘉興倅呉履齋就除守啟擢自屏星牧兹藩土二千石良吏民知慈母之臨十五載掄魁士有淹才之歎獨欣知已式撫鄉邦歴具激昂少陳贊躍恭惟某官丰標玉立襟度冰清森羅星宿于胷中縱横禮樂于筆下天人大對世謂鼂董之後身性學微言𣲖傳伊洛之直下便合立從香案小却躋之玉堂為國光華乃君本分曩胡謙抑每欲退藏然劍埋豐城則光射天而水遇瞿塘則聲撼谷果興思于丹扆俄接武于清班滴露研硃芸閣幾勞於讐校菁莪在沚蘭宫多藉以作成為重外庸又煩更試眷兹輔郡借以監州風烟入懐每見成章山水可樂若甘吏隱人皆汲汲我獨于于民喻志而已孚事不勞而自理休聞翕上簡心益深謂半刺若是其聲光則承流可占其政化聿表除目髙建崇牙笑領魚符想䂓模之素定香凝燕寢煥風采之一新花鳥亦皆欣然山川莫不寜止即長史而為并都督故事已符以刺史而拜漢三公盛典行舉孟堅迂踈未學雕篆㣲工嘗升堂以親色詞抑過門而呈伎倆未䝉捐棄少辱矜知目新快于象班情實同于异趯滕㕓願受已歡顔厦屋之中狄籠兼收或效力牛馬之走賀陳可齋憲使冬至啟伏以振節崇臺管領初爻之剛長埋身下掾欣榮九地之陽回慶應時之福申冀覃天之澤普恭惟某官節髙松操徳愈梅清公道陽舒排羣隂而盡屏恩波雷動鼔衆彚以咸甦身同北陸之獨寒心望東皇之普育觀䑓候雲氣想祥擁于吉星春風不世情願緑滋于枯草賀雲麓先生除紹興帥啟恭審渙班宸綸升鎮藩府東甌岳牧式崇帥節之雄西清邃嚴庸示文儒之重帝心寓眷于柄用輿情翕贊于歡聲恭惟某官典型傳家貴顯奕世許公濟美有光文穆之勲名忠宣在朝最獲祐陵之眷顧矧是謀猷之外展已多膏澤之下流沛運餉於木牛衍熬波於形虎左馮著循良之譽三呉騰富庶之謡文昌班行久紆八座之武太㣲垣次新占一星之眀人共傒霖雨之及民上允念相門之克嗣奚尚遲鈞台之命又煩分斧鉞之權眷言嵇山實維潛邸孰繼難兄之躅須藉塤箎為重南陽之邦是資藩翰謂君家有扶日之績故侯封在流虹之區載稽分命之及兹的顯具瞻之有屬雲門蒼翠歡同竹馬以來迎沙堤委虵行報衮衣之歸輔某肖翹自幸際㑹有初始受滕㕓荷賞㣲勤於筆藝逮逰庾幕迄䝉合頴於剡箋掀天恩光曽未報酬隨地陽春又兹趨事夙固衘環之有志今寜陳力之無堦况計及𤓰之期適湊班條之際此機緣之就巧信頂踵之䝉榮謹先拜堦欣叙賀厦催科定拙預希繩墨之寛施恩素深豈越帡幪之外代作院弟安吉趙倅啟冰柱雪車夙仰兩山之髙致鹽車皂櫪行逢伯樂之青矑肅將事上之恭因述由衷之語輪囷布牘特達望知恭惟某官鳳覽徳輝麟逰治世粹質萃璿源之秀潤雄文鍾星婺之光芒夜雪㶚橋已富錦奚囊之句鈞天帝所遲賦沉香亭之詩笑攀月桂之兩枝清哦黄竹之干挺手抉雲漢妙製作於上方花種河陽仍阜康於畿邑矧呉興乃苕霅之名邦而長史有風烟之逸興詎能躁進且樂清遊蓮歌動夕泛之舟蘭氣薫山行之屐時㟁幘而嘯詠或肆筆而批塗風月藉以輝光山水添其鮮碧南樓吏隱儘無耽松雪之娯西掖詞林行促侍金蓮之對某行卑屬籍世業文儒皇祖占紹熙之甲科諸父聫丙戌之上第以至雁行之輩居多鵾化之人書種傳家舉箕裘之不墜泥塗失足撫松鶴而獨歎固惟駑蹇以使然亦為見聞之弗廣今將升堂攀木持莛扣鐘義倣師生親同子姓黄鍾儻隨蟄動青蟲亦化蝶飛含垢匿瑕不但求萬間之庇溉根食實是將託六尺之孤巧夕謝文園饋節啟傴僂事再拜懶陳河鼔之文籠絡送八珍忽遂侯鯖之品儼昭隆意庸紀佳時駢羅列篚之登珍重一忱之感蹣跚吏隱移牀但㸔於蛛絲赫奕王封飛綍佇占於鵲喜送知府俞大卿七夕劄子某僣懼申禀某恭惟銀漢雙星之渡與天俱久與時俱新宜有以薦一臠之敬僣易瘠羊半體生蟳十枚馬乳七斤巧餅百事謹拜手塵獻方兹錦樓髙張吸飲花露眎此下品殆不足進倘許雜陳於芳馨之林某幸出望外冒凟尊崇當暑冰凛仰丐涵貸又送鄭廣文七夕劄子當暑不敢多禀首丐涵照方銀漢雙星之㑹詎應無以為芳筵薦得醉蟳魚百尾馬乳五斤拜手莞留之寵輕觸重繡天巧滿前顧以此塵品自見其用拙亦甚矣餘須侍對敷叙併伺委詧送俞守七夕劄子某切審靈仙問偶駕白鶴于緱山西母遊神集青鸞于華殿絳河雲合天上佳期綵線月穿人間樂事可無㣲物以表寸誠率易羊膩荷根仰薦眀星之酒輕凟尊崇伏深愧懼仰空中之繡幄知正視之無緣曝腹内之殘書尚品題之有望區區伏祈照察又送林郎中七夕劄子某敬承青楓丹桂之舟徃來秋色間上與星漢通河鼔雲車佳時勝㑹俯眎人世之追凉覔巧正不足供一笑某尚敢摭溪毛之㓗以請真未能免俗者宓惟髙明姑首肯其厪某幸出望外凌躐兢慙拱祈涵宥又七夕送物與薛参政雙星嘉㑹百鵲争鳴巧席迎新潭居浹笑某慿藉眷遇之隆忘其嬰觸不腆菲物班諸别楮百拜申羾庸求附于𤓰果之末倘䝉鈞仁莞而勿罪命之曰留千百至幸犯嚴之譴拱湏靣侍以列仰祈鈞詧又回七夕節儀星女臨河敢覬天機之巧月卿洒汗遽分雲錦之章香泛樽罍珍羅鼎俎恥匪頒之難稱知眷雅之逾深百拜登嘉一忱増激某下情無任皇恐感謝之至又回通判七夕送物朅來逾月倐見秋開銀漢㑹星金天流火仰承眷意過辱華牋寵以蜜酥侑之珍品西果滿堆於馬乳南烹如得於蟹螯輪囷謝私登受感佩又回徐二學士送七夕某近占好事五雲細織之新逺念勝遊雙星髙㑹之舊懃斯藻縟之意貺以芳膩之珎𤓰果之筵得此不貧藜莧之腸侈然自富巧諒非於人與拙祗用以吾存今年必勝於常年此夕莫知於何夕飲牛有約須言感於秋期噪鵲無端乃錯傳於早訊佇觀奏雋毋俟乞靈銜荷拳拳具報草草又回朱郎中送七夕劄子某昨布敬籖閣比介雖未旋計已塵净雲之聴惔焚如許正懷未能訪便孠􅀈忽被八法之妙倚風快誦字字如玉雖宥之清涼國不若是其爽也謙尊而光睠記冞篤籠鵝厨餅之饋特以煥其星節回顧昔時列瓜果於中庭今盛意所臨尤増感慨謹進使人某再拜登受矣郊外夜歸不克函修謝幅填膺銘惑之至儲存侍控仰丐澄矚又回何宣教送七夕某伏沐藻帖誦之清風習習也肥羜名尊為星節貺遂使棲懶之餘者又未免追凉逐巧矣勤眷若此辭則弗容受而有惑占報草率尚遲謁謝雜著陸宣公祠騷辭祠在嘉禾東門鴛湖水中自節齋先生建立達政修崇兼以陳公舜俞趙公汝愚配祀然未有明建祠之意以為迎饗送之詞者輒不揆賦楚辭以補祀事之闕文云滄波兮鱗鱗渺涵浸兮青天引余睇兮何思思有唐兮貞臣世混濁兮其逢豈余宜兮弗伸蹇溷嫉兮羣僉紛吠噬兮狺狺慨百奏兮仁義跪長袂兮重陳不負君兮與學甘殺身以成仁能不忘兮在莒豈土運之中屯遺髙風兮來思𦍑有屬於後人侯是邦兮多賢美人才兮作新擬甍棟兮龍宫招忠魂兮水濱合里社之前修配祠祀兮拳勤公神遊兮九霄奚是邦之獨親維桑梓兮必恭寜作興之無因期滋蘭兮成芳戒一蕕於衆薫彼木蘭兮桂槳蕩秋月以花春醉壺觴兮流泳雜雅鄭兮繽紛誰于是兮興懐曽華實之靡分朗余詞兮一奠儼英靈兮若存景陸堂宣公泉銘并序甘棠勿翦峴石興思慨念先猷其來尚矣若夫旌遺芬於既徃開微緒於將來撫物興懐即躬詔訓風以動之厥有深㫖欽土思泉宜黄君之所甚崇也君雙井太史公之諸孫域其名盖之其字也質凝堅璧撡肅稜霜事上無諂戢下有威其諸古之遺直夫尉是禾興考圖繹志曰嘻其敬哉維治之宅唐相宣公之遺基也坎甃之泉亦吾宣公之鑿也彼美人兮窅弗可覿幸徵其迹也凢見其迹如見其人宜景其行也表而彰之吾惟汲汲何昔聞之寂寂也於是即其基肇堂曰景陸堂礱石楯泉曰宣公泉豈徒侈輪奐濯滄浪而已哉端居是堂夷夷于于榮辱俱忘寵内相遷忠州始終一節乎潄芳新泉湛湛冷冷甘辛無作毁竇㕘救陽城恩讐兩冺乎其然無愧然矣居心固合於是表而彰之景仰皆吾心乎忠讜皆伊人乎一物之微善人心之樞紐乎小子孟堅庸嘉乃心敬述以銘僣其奚辭乃銘曰洵美宣公偘偘忠兮延延英聲千萬齡兮匪如伊人孰體諸心履諸身兮維涪諸孫如玉温兮𠖇𠖇心孚若合符兮乃肇乃龍髙風崇兮其夷其冷于以鑒中扄兮敢告後來毋使此風頽兮適吾之願兮公千萬齡如親見兮枕屏銘夢親當思孝夢君當思忠夢得當思義夢逹當思窮夢慾當思窒夢遻當思從更貴常安恬楊花春晝風典獄箴并序郡糾曹鄞史君某謂諸王孫趙孟堅曰凡厥官守俱有攸箴祗惟典獄未之有聞子為我詞將勒石以告典司是職者庶其敬戒若正孟堅曰孟堅曩司霅李曺掾具知典司生殺從出人命關焉國家以仁立國治體關焉有隂有陽是有刑賞造化關焉厥惟艱哉甞擬刻詞以告然心吾心不待告告亦不懟否則聞斯靣發赤告奚益曰固然姑述以倣盤盂之銘寜不有警中人以上可為善惡間者乃為之箴曰一隂一陽主生主殺賞善刑惡于天是法姑息縱奸苛細流察惟平厥心乃洞毫髪少以恕行國體斯逹自揣而昭恪尸是官勿冒而居有靦面顏或尔所餒閣筆睨吏舞手而乘重輕易位亦有過矯衒明暴厲或徇已私或附㫖意鉤距煅煉置人死地仍有黷貨以私蔑公惟利是媢如盲如聾折抑曲鬱寃報無窮嗟人體膚父生母育孰非愛惜鞭扑桎梏風號霜厲以之成嵗不有刑章惡滛靡制以刑示訓乃仁之至用豈得已豈伊忽視偶淪曖昧明其匪戾有事誣衊排彼譎詭執迷底滯開讐釋冦長吏鑒差委曲剖示權與勢來有死無二庸庸祗祗如臨上帝敢告凡百警戒於是為張道父賛二畫卓杖褰裳苔封石滑飛泉下奔電激弩發對此兢兢謹戒斯達君子人與于以得檢身之法右臨深謂可渉歟或虞其澌謂不可渉歟已至於斯觀此可以知易既濟當如未濟之時右履薄二十贊松嵓盛生臨老融畫煙雨館作川平草肥竟日忘返及爾還歸山昏路逺噫吾竊笑夫迷途而見晚者也努力深耕贍活大衆卻行不前牽拽乃踵噫吾每鄙夫有力不施於用者也為仁師賛彌勒佛見說你將出世且莫只管昬昬睡多少鶻鶻突突底要你討塲分曉理金山順濟廟英烈錢侯碑文夫聰明正直謂曰神靈膺國褒封饗世血食厯祀不冺主福主災赫然炳靈人恒斯畏豈偶然哉克孝克忠為國犯難生昭直節殁助隂靈者也英烈錢侯所以身陪正祠封受顯號其以斯乎紀石傳芳示垂奕世請從具載寜厭纎委西浙諸州禾興最為邊海華亭縣小金山者又在郡東挿脚滄溟峻岸截起驚濤四浮吴國備史載漢博陸侯霍公附小黄門謂吳主曰國之疆土東齧海濤虧蝕侵尋臣漢舊輔今當為神駐小金山為禦海斥使不衝蕩全䕶國封當為建祠于彼金山示所旌顯自時厥後封祀不絶今為忠烈王順濟廟焉維英烈侯家閥氏錢行位居七航海而商舶帆輕從入廟致禮儼觀威爽雪浪東來一山若峙巖巖殿宇卓冠山椒地勢神靈軒赫斯稱又諗王忠存漢社稷歆生敬慕若曰浮沉罔利膠轕迷塗汩淟塵中何終底止歿事忠臣愈浪生死猛念倐發幽明洞符玉立廡間义手瞠視不欹不倚窅然化歸異哉於是驚恠顯迹為廟部臣老宿相傳幾百年矣季夏之月廿一日維侯生辰沿海祭祠在在加謹廣陳鎮金山祠祀尤嚴常嵗是日鹽商海估寨伍亭丁社皷喧迎香花羅供然前無位號未應國經仗隊弓刀遥稱太尉殆幾野廟殊闕聲猷屬青齊向化之年金人猶競東鄙興師侯能助順虛無之際神証用彰霧滃雲飛隂兵千萬排空而下旌旗著號華亭錢太尉識昭明逮及交鋒敵勢披靡風駈電掃𠖇助維多主兵上之公朝訪尋允合爰加封勑諡以英烈庸畣靈休端笏垂紳榮彼章服從飾仗衞益變魚雅孟堅母弟孟淳今嗣秀安僖王曽元孫曩居里日嘗謂言曰英烈侯神靈國勲如是其偉兄志於文盍為紀述其永聲聞當備樂石以奉刻詞兹以書來石既就礱紀弗可後乙已上春甲子薰篆滌毫寓誠厯叙因作言曰夫所謂聰明正直謂神者豈誣哉忠烈王功存漢祀雖世禄不嗣於當時而廟食乃存於異代盖忠誠勲績迄莫冺㤀英烈侯初焉非衣逢掖道先王者一念向正即𨽻明祠惟王與侯肹蠁相應如斯至者心公忠耳故侯卒能效順佐邦郤殄强敵使侯居廟堂而職臣事殺身成仁夫豈難能者鄙夫身縻好爵畏事齷齪當言不斷口若置箝䑕計自營盻視同列茍利飲啄縮縮循墻鬼蜮斯靡何有何無若拜侯祠有泚其顙孟堅疇昔之夕矚視岳神節仗旋歸繽紛肅截璧月當午簫吹撼空文繡兒郎粉黛優女晝燭椽列夾道秉行敬拜奉安一無醉懈頋而問曰此嬰臼社稷臣也心實歆焉曰有親在無伐言曰人死留名豹死留皮丈夫大節雖死猶生睢陽之忠常山之操平原叱希烈太尉撃朱泚讀史凜凛恨九原之不作也神之為神其以是夫因述侯事遡頌王忠夙公忠鯁不覺宣露為之銘曰正直為神維忠維孝國有常經祀典崇報博陸在漢擁昭立宣雖曰世禄不我以延逮及異朝血食廟祀為禦隄封叱捍潮水毋使侵齧虧厥疆理至于今世靈威若存英烈錢侯起身七閩浮舶而商致禮英靈惟公與直志合心傾一誠黙孚旋𨽻部下拱立廟廡杳然𠖇化東海之濵奉祀畢䖍位號封崇若有待然厥敵不競東鄙興師維侯助順若響之隨神兵千萬隂雲擁之敵勢旋靡電掃風披昭靈顯切褒號英烈服爵儀衞一變緜蕝我刻銘石匪事誇雄寓勸若人知孝而忠為食君禄當勇於事事依違者將焉用彼致忠于君奮不顧身身死不死其名永存史傳紀績廟食薦馨吁嗟鬼蜮狗茍蠅營宋彛齋趙孟堅記為宗學立愛齋同舍作祭土地文昨嵗元日聖天子奉玉巵為慈極夀恩賚旁加諸生咸免秋賦翕上春官繇兹甲子以往三日實維試藝之期是用列拜一詞乞靈神祗為是禱也然禱之罔不在吉猶嵗之罔不願豐某等終嵗孜孜耨荒耘耔亦粗勤止若夫得之於心若或啟之筆之於書若或相之爾神其無賴哉香明酒清敬以將事神其聰明庶㡬祐之祭土地興文王文神涖吾學何莫不司况羣試春闈由是服命王官允為重事其敢不告酒殽其登馨香苾芬達神之靈神將若曰若愿而勤業精行成是日也俾清明其神氣鬯於而詞决科如拾芥然神其懋孚此忱繁昌縣學南豐祠堂祝文維年月日具官趙孟堅謹以清酌之奠告於南豐先生中書曽公孟堅初抵邑奠謁學宫堂廡之東祠曰三賢問賢謂誰曰先生闡文記邑興造荆國王相記學之成爰並祀兹蔡相確甞令邑因麗焉孟堅曰嘻是得例曰賢乎且荆國曩列從祀聖天子詔其曲學謬差媒進小人基禍誤國屏而斥已疇敢復存確鬼蜮姦造謗滔天誣蔑我宣仁聖烈太后掃除正人以致敵難罪通于天誰其薫蕕罔銓徒以令故而齒是諸伊蔡與王並從斥徹維先生髙名清文是敬是式儻及在元祐建中靖國間則必偕紫薇中立輔政决不為布之黨姦也奉祠敬止繇今丁祀籩豆犧牲分享于祠視從祀禮爰率學徒昭告以聞尚饗告曾髙祖墓文吾家渡江卜居廣成己逾百年衣冠為盛紆青拖紫殆幾百人以科第進僅十六七朝紳旄節前後相輝以舉改秩則方再見孟堅何幸學校竊第考舉晚選乃兼叨忝允藉祖宗福䕃斯及知本知報懇懇寸心誓殫亷勤期於無墜試邑將行束衽昭告惟我祖禰益加庇康俾暢官業告祖考墓文我祖云徃家運中屯我父苦辛曽蔑小泰祖及見孫期于有立父屬爾子勉從奮興孟堅兒時慨體先志力貧向學獲竊末第一紀從官三任改選分邑暨浦指期駕途拜墓告䖍俯仰感慨惟我祖考福䕃加崇由是而之績業更茂告伯祖桂陽使君墓文孟堅兒年家否貧無學資惟公延師收拾教誨伯祖母氏顧憐尤至中間辜負惟多曽無過尤撫存彌厚厯厯恩紀毎圖報酬竊第有年甫兹晚選謹亷自舊未脫儒酸惟有報心皎皎常在向去寸進須表毫絲試邑將行跼躬敬告慨念夙昔百酸攪腸再拜申詞淚落清奠同諸暨縣官祭江隂史君趙監簿文孟堅等仕通徳里仰喬木家欽止令聞玉粹無瑕所積者厚所務必遐公侯衮衮大纛髙牙指日可詣誰謂一麾竟正斯耶識與不識莫不為之痛悼而咨嗟者也􅀈率寅寮旅申酹奠稽首敶詞有淚斯泫而孟堅者丁年學校行藝尤欽擇交不茍義同斷金彼輕且獧錯立如林人虎我䑕未始競心涇涇渭渭允有知音青燈相對夜漏沈沈擁鑪促膝吾伊苦吟嵗寒髙節屬望允深方圖依倚愴判古今遡念疇昔心攢萬針此孟堅所以出位摧頓俯仰未艾不知涕泗之横襟矢詞弗翦一冩真忱九泉有知于兹鑒歆祭女文年月日母兄遣幹者施椿逺將祭奠告于亡女趙氏五三縣主孺人之靈吾女縣主喚復應否哀哉吾腹誕吾女僅汝及長愛之鍾也生而慧成人而淑盛年而天云亡未之信也相望千里病不及視死不及訣殮不及臨痛之甚也報訃兼旬兹甫舉掛又莫親徃遣皂代祭哀抑至也家釀清洌汝飲斯便以酹生芻汝歆饗否吾詞悲惻汝知聞否哀哉汝㓜而長甘苦吾同歴叙于兹汝其聽取汝未及笄儼已成人承順色難了無齟齬吾家儒素攻苦澹泊習以安之組絍縫紉教輒通解待人接物婉委舂容人皆汝期夀考成立自議姻盟祗慕閥閱不量齊大竭力遣嫁汝兄三年奔波于外一縷一物親辦親營必當汝心不計難易汝所知也從人以來十有四載良人諧汝姑嫜恤汝妯娌友汝族黨姻盟咸愛敬汝上下内外媵妾皂𨽻無間言于汝表汝為人有可尚者閫内之事于汝屬也惟母及兄亦汝期也汝自竪立克負荷也天何慘諸畀汝淑質不長汝年斬焉中夭又無嗣息璧碎雲飛空中聲滅聞者悼悵何况所親何况骨肉若罔知覺木石其心汝訃之來母之與兄適皆在病哭枯無淚叫絶無聲逾今兩旬行住坐卧唯啼唯泣思汝靣目想汝平生一見無門㝠㝠夢覔亦莫再逢苦痛苦痛何可復說汝無别病惟苦脚氣頻年發動玩視為常祗道宿疾豈謂䘮生去冬極寒書來說病固知増劇滿望春和可從藥喜早知遽爾作急救療豈至斯耶汝㝡解事多慮多思親睦姻聨殫力逢迎惟求禮貌心之所詣力有不加營耗精神病亦由此去年此時兄將之官母病在道旅泊烟雨問藥醫師汝翁汝夫深相存䘏汝日繼夜衣不解帶調侍藥餌備極孝心况在少年不惜支體救親病患如古孝烈使為男夫忠孝應至及吾病遏揚帆啟行送吾城西雲壑塔院閤淚告别不忍舎吾吾在華巔每虞風燭未經年嵗翻哭汝䘮哀莫甚此汝既云徃所可無憾惟在送終聞自瞑目厭于有尊拘忌過多屏從别舎為人子婦豈是孤魂欲遷蕭寺尤非禮式汝之靈爽㝠黙之中應念何咎生死遽殊昨為同室之人今為舎外之鬼母兄致書暁汝尊者即安汝柩姑停竹西徐議歸藏必有攸處汝其安止毋恐毋驚以順命分英氣不消再生必遇悲隨念到萬萬千千哭己無腸且此收拾遇汝毎七薦供于斯百日朞年及至攢𦵏須再祭聞哀哉哀哉吾女吾女止于是耶止于是耶髙天髙天訊問不應祭持要弟文年月日兄弟某等祭于孟三節推帥僉文林之靈嗚呼騏驥千里出門斯蹶寳璧堕地應手碎裂惜哉傷哉惟汝聪眀肇自弱齡翩翩文思下筆不停年未及冠胄薦標名南宫前龜拾芥取青充其餘力學靡不成隸古題勒字法勁精吟工雜著既愽且宏施於宦業綽綽有聲三任五考奔波不少自吳入淮幕府選表瞥飛五鶚筞勲亦早來嵗為期秩改班到逺業窮官期汝非小冀汝騰驤門户有耀天胡不仁竟爾己焉不使之終老耶方汝疾殃相望一方莫究病源攻其膏肓或云服餌厥匪温良果因之而致損傷邪抑一定者數不可加其短長邪爾兄在都聞汝病急相從訂訊日者龜筴布蓍算揲咸弗謂吉短燭寒宵相顧失色的報未來莫為汝詰維揚急脚言訃歴歴曰季冬九日日未斜側天亡若人鵩鳥入室又相與掩泣衘哀猶冀此言之非的也誰謂汝之俊偉汝之充碩奄然一逝真成永隔嗚呼哀哉最汝悲者丁男未育親髮半白及此云亡釁變允極命汝之紀歸汝之骨事貴從長未應倉卒書報汝父相與紬繹尅日舉掛招汝魂魄汝尚知否吾淚血滴尚饗從伯故麗水丞趙公墓銘代作有宋通直趙君行之之墓在安吉州歸安縣鄉山之原嗣子孟珤以紹定五年月日奉襄事乞銘于某以丙戌進士同登有是請也噫天之所畀每嗇於所宜與此從古所莫可詰今又重歎於君焉君以敏悟之資秀出璇源方弱冠己薦取應舉寜考登寳位補官右選調管庫之任于婺于泰于衢者三又監御前軍噐所司行在草料場踸踔西階逾三十年未嘗一日忘科舉業也故自丁夘迄已夘以鎻㕔試而舉者亦三春闈率不偶積階至忠翊今上皇帝賚賜子換文階舊比宗姓換階視見服官品忠翊則應得京秩新制裁革回視初薦僅循從事丞處之麗水君平昔逰際貴達方將汲引郡侯葉公武子趙公必願咸加奬且薦其才庶有行也而君疾不可復起矣悲夫以半生績學之勤裁於制不得有其有而下從選調淹矣而又奪之年不得詣髙夀賦與之嗇可詰也夫君諱與時年五十七紹定四年十一月日終上章告謝尋通直命下弗之覿也曽祖伯頴故修武郎祖師古故秉義郎父希宜故桐城令宣教郎致仕妻魯氏少卿公訔之孫女今封令人以男孟珤皇姪右監門衛大將軍郊恩也長男孟瑞故承信郎次孟珤孟瑨女四人孫一人奉公之䘮麗水者母弟與善也惻為之銘曰謂其可必天則爾嗇謂其可期天則不可知厚其積乃狹其施其後人之貽
